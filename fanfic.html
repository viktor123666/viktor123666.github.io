<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write Your Own Scalelist Story | Scalelist Universe</title>
<meta name="description" content="Give an idea, pick your favorite character, and the Scalelist Universe writes you a short, canon-faithful story — yours to copy, save and share.">
<link rel="stylesheet" href="/su.css">
<script defer src="/su.js"></script>
<style>
  .ff-hero{min-height:auto;padding:3rem 1.2rem 1rem;}
  .ff-what{max-width:62ch;margin:.6rem auto 0;color:var(--text-dim);}
  .ff-wrap{max-width:840px;margin:0 auto;}

  .ff-rail{display:flex;gap:.55rem;overflow-x:auto;padding:.4rem .2rem 1rem;scrollbar-width:thin;}
  .pick{flex:none;width:78px;text-align:center;cursor:pointer;opacity:.6;transition:opacity .2s,transform .2s;}
  .pick:hover{opacity:1;transform:translateY(-2px);} .pick.on{opacity:1;}
  .pick img{width:66px;height:66px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid transparent;background:var(--void-2);}
  .pick.on img{border-color:var(--c);box-shadow:0 0 16px -3px var(--c);}
  .pick .n{font-family:var(--font-display);font-size:.72rem;margin-top:.3rem;color:var(--text);} .pick.on .n{color:var(--c);}

  .ff-form{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem;margin-top:.4rem;}
  .ff-form label{display:block;font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:0 0 .4rem;}
  .ff-form .sel,.ff-form textarea{width:100%;background:var(--void-2);border:1px solid var(--border);border-radius:10px;
    color:var(--text);font-family:var(--font-body);font-size:.96rem;padding:.7rem .9rem;outline:none;}
  .ff-form textarea{min-height:90px;resize:vertical;line-height:1.5;}
  .ff-form .sel:focus,.ff-form textarea:focus{border-color:var(--c,var(--gold));}
  .ff-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
  @media(max-width:560px){.ff-row{grid-template-columns:1fr;}}
  .ff-go{margin-top:1rem;width:100%;justify-content:center;}

  .ff-out{margin-top:1.6rem;display:none;}
  .ff-out.show{display:block;}
  .story{background:linear-gradient(180deg,rgba(201,168,76,.05),transparent);border:1px solid var(--border);
    border-radius:var(--radius);padding:1.8rem;}
  .story h2{font-family:var(--font-display);color:#fff;font-size:clamp(1.4rem,3.4vw,2rem);text-align:center;margin-bottom:.3rem;}
  .story .by{text-align:center;color:var(--c,var(--gold));font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.3rem;}
  .story .txt{color:var(--text);line-height:1.85;font-size:1.02rem;white-space:pre-wrap;font-family:var(--font-body);}
  .story .txt::first-letter{font-family:var(--font-display);font-size:2.6rem;color:var(--gold);float:left;line-height:.9;margin:.1rem .5rem 0 0;}
  .ff-actions{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-top:1.2rem;}
  .ff-status{text-align:center;color:var(--text-dim);font-style:italic;min-height:1.4rem;margin-top:1rem;}
  .ff-status.err{color:var(--red);font-style:normal;}
  .typing{display:inline-block;}
  .typing::after{content:"";animation:dots 1.4s steps(4,end) infinite;}
  @keyframes dots{0%{content:"";}25%{content:".";}50%{content:"..";}75%{content:"...";}}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--panel-solid);
    border:1px solid var(--border-bright);color:var(--gold);padding:.7rem 1.2rem;border-radius:999px;font-size:.85rem;transition:all .3s;z-index:2000;}
  #toast.show{opacity:1;transform:translateX(-50%);}
</style>
</head>
<body>

<header class="su-hero ff-hero">
  <div class="su-kicker su-fade">Your story, in this universe</div>
  <h1 class="su-fade-2">Write Your Own Scalelist Story</h1>
  <p class="ff-what su-fade-3">Here's what this is: give a single idea — a moment, a meeting, a what-if — pick your favorite character, and the universe weaves you a short, <strong>canon-faithful</strong> story around it. It's yours to keep: copy it, download it, share it.</p>
</header>

<main class="ff-wrap su-section" style="padding-top:1rem;">
  <div class="ff-rail" id="rail"></div>

  <div class="ff-form" id="form">
    <div class="ff-row">
      <div>
        <label>Your character</label>
        <div class="sel" id="charName" style="display:flex;align-items:center;gap:.6rem;">
          <img id="charImg" src="" alt="" style="width:34px;height:34px;border-radius:50%;object-fit:cover;object-position:center top;">
          <b id="charLabel" style="color:#fff;font-family:var(--font-display);"></b>
        </div>
      </div>
      <div>
        <label>Setting (realm)</label>
        <select class="sel" id="setting">
          <option value="scalelist">Scalelist (the prime world)</option>
          <option value="helios">Helios — the Storm Court</option>
          <option value="astralis">Astralis — the galaxy floor</option>
          <option value="codexia">Codexia — the obsidian spires</option>
          <option value="heartbeat">Heartbeat — the lakeside cabin</option>
          <option value="trinity">Trinity — the triple void</option>
          <option value="thanatos">Thanatos — the spiral graveyard</option>
          <option value="null">The Null — the absence</option>
          <option value="ferdinand">Inside Ferdinand, the world-tree</option>
        </select>
      </div>
    </div>
    <label>Your idea</label>
    <textarea id="idea" maxlength="600" placeholder="e.g. Kompis and Mingus find a stranger asleep on the dock at dawn…"></textarea>
    <button class="su-btn ff-go" id="go">✦ Weave my story</button>
  </div>

  <div class="ff-status" id="status"></div>

  <div class="ff-out" id="out">
    <div class="story">
      <h2 id="st-title"></h2>
      <div class="by" id="st-by"></div>
      <div class="txt" id="st-txt"></div>
    </div>
    <div class="ff-actions">
      <button class="su-btn-ghost" id="copyBtn">⧉ Copy</button>
      <button class="su-btn-ghost" id="dlBtn">⬇ Download .txt</button>
      <button class="su-btn-ghost" id="shareBtn">↗ Share</button>
      <button class="su-btn" id="againBtn">✦ Another</button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const ROOT="/characters/art";
const CHARS=[
 {k:"vigolas",n:"Vigolas",c:"#00ff88"},{k:"rougeina",n:"Rougeina",c:"#ff3366"},{k:"kompis",n:"Kompis",c:"#ffaa00"},
 {k:"smurjan",n:"Smurjan",c:"#00aaff"},{k:"trollmage",n:"Trollmage",c:"#9933ff"},{k:"mingus",n:"Mingus",c:"#e9b949"},
 {k:"isa",n:"Isa",c:"#67e8f9"},{k:"opha",n:"Opha",c:"#d946ef"},{k:"runa",n:"Runa",c:"#d4a056"},{k:"ogar",n:"Ögar",c:"#a78bfa"},
 {k:"niva",n:"Niva",c:"#e5e7eb"},{k:"njord",n:"Njord",c:"#38bdf8"},{k:"kvar",n:"Kvar",c:"#c2675a"},{k:"vidar",n:"Vidar",c:"#cdb878"},
 {k:"iska",n:"Iska",c:"#fbbf24"},{k:"tova",n:"Tova",c:"#f59e0b"},
];
let cur=CHARS[0], last=null;
const rail=document.getElementById("rail"), form=document.getElementById("form");
const charImg=document.getElementById("charImg"), charLabel=document.getElementById("charLabel");
CHARS.forEach(ch=>{
  const d=document.createElement("div"); d.className="pick"; d.style.setProperty("--c",ch.c); d.dataset.k=ch.k;
  d.innerHTML=`<img loading="lazy" src="${ROOT}/${ch.k}/${ch.k}_hero.webp" alt="${ch.n}"><div class="n">${ch.n}</div>`;
  d.addEventListener("click",()=>select(ch)); rail.appendChild(d);
});
function select(ch){ cur=ch; form.style.setProperty("--c",ch.c);
  document.querySelectorAll(".pick").forEach(p=>p.classList.toggle("on",p.dataset.k===ch.k));
  charImg.src=`${ROOT}/${ch.k}/${ch.k}_hero.webp`; charLabel.textContent=ch.n; }

const statusEl=document.getElementById("status"), out=document.getElementById("out"),
      stTitle=document.getElementById("st-title"), stBy=document.getElementById("st-by"), stTxt=document.getElementById("st-txt"),
      go=document.getElementById("go");
async function weave(){
  const idea=document.getElementById("idea").value.trim();
  if(!idea){ document.getElementById("idea").focus(); return; }
  go.disabled=true; out.classList.remove("show");
  statusEl.className="ff-status"; statusEl.innerHTML=`<span class="typing">${cur.n} is weaving your story</span>`;
  try{
    const r=await fetch("/api/fanfic",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({character:cur.k, setting:document.getElementById("setting").value, idea})});
    const j=await r.json();
    if(j.offline){ statusEl.className="ff-status err"; statusEl.textContent="⚡ The story-weaver isn't switched on yet — it's waiting for its key. Try again once it's live."; }
    else if(j.story){
      last=j; stTitle.textContent=j.title||"Untitled"; stBy.textContent=`A tale of ${cur.n} · ${document.getElementById("setting").selectedOptions[0].textContent}`;
      stTxt.textContent=j.story; statusEl.textContent=""; out.classList.add("show");
      out.scrollIntoView({behavior:"smooth",block:"start"});
    } else { statusEl.className="ff-status err"; statusEl.textContent=j.error||"The weaver faltered. Try again."; }
  }catch(e){ statusEl.className="ff-status err"; statusEl.textContent="The realm connection dropped. Try again."; }
  go.disabled=false;
}
go.addEventListener("click",weave);
document.getElementById("againBtn").addEventListener("click",()=>{out.classList.remove("show");document.getElementById("idea").focus();window.scrollTo({top:0,behavior:"smooth"});});

function fullText(){ return last ? `${last.title}\n\nA tale of ${cur.n}\n\n${last.story}\n\n— Written in the Scalelist Universe · scalelistuniverse.com` : ""; }
function toast(t){ const el=document.getElementById("toast"); el.textContent=t; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2200); }
document.getElementById("copyBtn").addEventListener("click",async()=>{ try{await navigator.clipboard.writeText(fullText());toast("Story copied ✓");}catch{toast("Couldn't copy");} });
document.getElementById("dlBtn").addEventListener("click",()=>{ if(!last)return;
  const blob=new Blob([fullText()],{type:"text/plain"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=`scalelist_${cur.k}_${(last.title||"story").replace(/[^a-z0-9]+/gi,"_").slice(0,40)}.txt`;
  document.body.appendChild(a); a.click(); a.remove(); toast("Downloaded ✓"); });
document.getElementById("shareBtn").addEventListener("click",async()=>{
  if(!last)return; const data={title:last.title,text:fullText()};
  if(navigator.share){ try{await navigator.share(data);}catch{} } else { try{await navigator.clipboard.writeText(fullText());toast("Copied — paste it anywhere ✓");}catch{toast("Use Copy instead");} } });

select(CHARS[0]);
</script>
</body>
</html>
