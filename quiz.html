<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Scalelist Character Are You? | Scalelist Universe</title>
<meta name="description" content="Eight questions to find which of the sixteen souls of the Scalelist Universe you truly are — from Vigolas to Mingus. Shareable result with their portrait.">
<meta property="og:title" content="Which Scalelist Universe Character Are You?">
<link rel="stylesheet" href="/su.css">
<script defer src="/su.js"></script>
<style>
  /* shares the design language of /realm-quiz — one family */
  .rq-hero{min-height:auto;padding:3rem 1.2rem 1rem;}
  .rq-wrap{max-width:620px;margin:0 auto;padding:0 1.2rem 2rem;}
  .prog{height:5px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin:0 0 1.4rem;}
  .prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold-bright),var(--gold));transition:width .4s;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;animation:su-fade-up .4s both;}
  .card .qn{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;}
  .card h2{font-size:clamp(1.3rem,3.4vw,1.7rem);color:#fff;margin-bottom:1.2rem;line-height:1.3;}
  .opt{display:block;width:100%;text-align:left;background:var(--void-2);border:1px solid var(--border);border-radius:12px;
    color:var(--text);font-family:var(--font-body);font-size:1rem;padding:.85rem 1.1rem;margin-bottom:.6rem;cursor:pointer;transition:all .18s;}
  .opt:hover{border-color:var(--gold);background:rgba(201,168,76,.08);transform:translateX(4px);color:#fff;}
  .intro,.result{text-align:center;}
  .intro p{color:var(--text-dim);max-width:50ch;margin:0 auto 1.4rem;}
  /* result */
  .result .key{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--c);margin-bottom:1.2rem;box-shadow:0 0 40px -12px var(--c);}
  .result .key img{width:100%;aspect-ratio:3/2.1;object-fit:cover;object-position:center 18%;display:block;}
  .result .key .cap{position:absolute;inset:auto 0 0 0;padding:1.2rem;text-align:left;background:linear-gradient(0deg,rgba(5,5,9,.94),transparent);}
  .result .key .yr{font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--c);}
  .result .key h2{font-family:var(--font-display);font-size:clamp(1.8rem,5vw,2.6rem);color:#fff;line-height:1;}
  .result .key .sub{color:var(--text);font-style:italic;font-size:.95rem;}
  .result .blurb{color:var(--text);font-size:1.05rem;line-height:1.7;max-width:52ch;margin:0 auto 1rem;}
  .result .acts{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--panel-solid);
    border:1px solid var(--border-bright);color:var(--gold);padding:.7rem 1.2rem;border-radius:999px;font-size:.85rem;transition:all .3s;z-index:2000;}
  #toast.show{opacity:1;transform:translateX(-50%);}
</style>
</head>
<body>

<header class="su-hero rq-hero">
  <div class="su-kicker su-fade">Sixteen souls · one of them is you</div>
  <h1 class="su-fade-2">Which Character Are You?</h1>
</header>

<main class="rq-wrap">
  <div class="prog" id="prog"><i></i></div>
  <div id="stage"></div>
</main>

<div id="toast"></div>

<script>
const C="/characters/art";
const CH={
 vigolas:{n:"Vigolas",sub:"The Infinite Administrator",c:"#00ff88",blurb:"You carry weight others can't lift, and you stay calm where the lightning is loudest. A born leader — weary, but unbreakable. Power is your burden and your gift."},
 rougeina:{n:"Rougeina",sub:"The Star-Dancer",c:"#ff3366",blurb:"You turn pain into light and refuse to let joy die. Warm, glamorous, fully alive — you dance where others freeze."},
 kompis:{n:"Kompis",sub:"The Buddy",c:"#ffaa00",blurb:"Loyal to the bone, funny, and steady. You're the friend everyone wishes they had — and the dog agrees."},
 smurjan:{n:"Smurjan",sub:"The Void Three",c:"#00aaff",blurb:"You're more than one thing at once and you walk the edges others fear. Quietly the strongest in the room. The bridge between worlds."},
 trollmage:{n:"Trollmage",sub:"The Codex-Keeper",c:"#9933ff",blurb:"Patient, deep, a little mysterious. You read what others skim, and you keep the secrets that actually matter."},
 mingus:{n:"Mingus",sub:"The Eternal Companion",c:"#e9b949",blurb:"You love without condition and make time stop just by being there. The purest soul in the universe. Sacred — the dog is forever."},
 isa:{n:"Isa",sub:"The Stillborn Heartbeat",c:"#67e8f9",blurb:"Quiet, calm, and far stronger than you look. You hold others together simply by being still — and time slows for the people near you."},
 opha:{n:"Opha",sub:"The Conjunction",c:"#d946ef",blurb:"You see how things connect, and you can't help telling the truth. You bring together people who never would have met."},
 runa:{n:"Runa",sub:"The First Rune-Speaker",c:"#d4a056",blurb:"Ancient-souled and wise. You carry knowledge older than the rules, and you give it carefully — because words have weight."},
 ogar:{n:"Ögar",sub:"The Far-Eye Watcher",c:"#a78bfa",blurb:"You see what's coming and what others miss. Solemn, perceptive, and merciful to those who are hurting."},
 kvar:{n:"Kvar",sub:"The Last One",c:"#c2675a",blurb:"You endure. When everyone else gives up or gives out, you're still standing — quietly, stubbornly, here."},
 iska:{n:"Iska",sub:"The Spark-Carrier",c:"#fbbf24",blurb:"Small, bright, and timeless. You remind people of their joy just by showing up. You carry the first light."},
 tova:{n:"Tova",sub:"The Thunder-Herald",c:"#f59e0b",blurb:"Bold and true — you can't stand a lie, and your word carries. When you speak, every room hears it."},
 njord:{n:"Njord",sub:"The Tide-Reader",c:"#38bdf8",blurb:"Calm, weathered, wise about timing. You feel things coming before anyone else — and you keep your own counsel."},
 niva:{n:"Niva",sub:"The Untraversed",c:"#e5e7eb",blurb:"A loner and a survivor. You're at peace where others panic, and you build something out of nothing."},
 vidar:{n:"Vidar",sub:"The Silent Reckoner",c:"#cdb878",blurb:"You say little, but it lands like thunder. Patient, just, and impossible to move. People feel your weight in the room."},
};
const Q=[
 {q:"Your friends would describe you as…",a:[["The dependable one","kompis"],["The mysterious one","trollmage"],["The life of the party","rougeina"],["The quiet, deep one","isa"],["The one who's seen it all","kvar"]]},
 {q:"Your idea of a perfect day…",a:[["Cabin, lake, dog, no plans","kompis"],["Dancing till sunrise","rougeina"],["Lost in a good book","trollmage"],["A long walk alone, somewhere empty","niva"],["Lighting one candle and just watching it","iska"]]},
 {q:"Under pressure, you…",a:[["Take command","vigolas"],["Crack a joke and keep everyone calm","kompis"],["Go very still and think","isa"],["See three moves ahead","ogar"],["Simply refuse to fall","kvar"]]},
 {q:"Your superpower would be…",a:[["Commanding the storm","vigolas"],["Being in three places at once","smurjan"],["Knowing every secret","trollmage"],["Making anyone feel happy","rougeina"],["Stopping time with a look","mingus"]]},
 {q:"What do people rely on you for?",a:[["Loyalty, no matter what","kompis"],["Hard truths","ogar"],["Hope when it's dark","iska"],["The real story, told straight","tova"],["Wisdom older than the problem","runa"],["Introducing the people who needed to meet","opha"]]},
 {q:"Pick a vibe…",a:[["The calm before the storm","vigolas"],["Neon and bass at 3am","rougeina"],["Candlelight and old pages","trollmage"],["Fog over a still sea","njord"],["Three of you, in perfect sync","smurjan"]]},
 {q:"How do you love?",a:[["Unconditionally, completely","mingus"],["Quietly, by always being there","isa"],["Loudly and warmly","rougeina"],["By protecting fiercely","kompis"],["By telling you the truth","tova"]]},
 {q:"What will they remember about you?",a:[["That you held everything together","vigolas"],["That you never left","kompis"],["That you saw them clearly","ogar"],["That you endured when no one else could","kvar"],["That you said nothing — and it changed everything","vidar"]]},
];

const stage=document.getElementById("stage"), progI=document.querySelector("#prog i"), progBox=document.getElementById("prog");
let i=0; const score={};
function start(){ i=0; for(const k in CH)score[k]=0; progI.style.width="0%"; showIntro(); }
function showIntro(){ progBox.style.display="none";
  stage.innerHTML=`<div class="card intro"><div class="qn">8 questions · 1 minute</div><h2>Find your soul</h2>
    <p>The five champions are fragments of one soul; the lineage adds eleven more. One of the sixteen is you. Answer honestly.</p>
    <button class="su-btn" id="begin">Begin the quiz</button></div>`;
  document.getElementById("begin").onclick=()=>{progBox.style.display="";next();}; }
function next(){ if(i>=Q.length)return result();
  progI.style.width=(i/Q.length*100)+"%"; const item=Q[i];
  stage.innerHTML=`<div class="card"><div class="qn">Question ${i+1} of ${Q.length}</div><h2>${item.q}</h2><div id="opts"></div></div>`;
  const opts=document.getElementById("opts");
  item.a.forEach(([t,c])=>{ const b=document.createElement("button"); b.className="opt"; b.textContent=t;
    b.onclick=()=>{ score[c]=(score[c]||0)+1; i++; next(); }; opts.appendChild(b); }); }
function winner(){ let best=null,bv=-1; for(const k in CH){ if((score[k]||0)>bv){bv=score[k]||0;best=k;} } return best; }
let resKey=null;
function result(){ progI.style.width="100%"; const k=winner(); resKey=k; const r=CH[k];
  stage.innerHTML=`<div class="card result" style="--c:${r.c}">
    <div class="key"><img src="${C}/${k}/${k}_hero.webp" alt="${r.n}"><div class="cap"><div class="yr">You are</div><h2>${r.n}</h2><div class="sub">${r.sub}</div></div></div>
    <p class="blurb">${r.blurb}</p>
    <div class="acts">
      <button class="su-btn" id="share">↗ Share my character</button>
      <a class="su-btn-ghost" href="/gallery#${k}">See ${r.n} in the gallery</a>
      <a class="su-btn-ghost" href="/cosmos/character-chat">Talk to them</a>
      <button class="su-btn-ghost" id="retake">↺ Retake</button>
    </div>
    <p style="margin-top:1rem;font-size:.84rem;color:var(--text-dim)">Or find your realm → <a href="/realm-quiz">the Realm quiz</a></p></div>`;
  document.getElementById("retake").onclick=start; document.getElementById("share").onclick=share; }
function share(){ const r=CH[resKey];
  const text=`I'm ${r.n} — ${r.sub} — in the Scalelist Universe. Which character are you? scalelistuniverse.com/quiz`;
  if(navigator.share){ navigator.share({title:"My Scalelist character: "+r.n,text}).catch(()=>{}); }
  else { navigator.clipboard.writeText(text).then(()=>toast("Result copied — share it anywhere ✓")).catch(()=>toast("Couldn't copy")); } }
function toast(t){ const el=document.getElementById("toast"); el.textContent=t; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2200); }
start();
</script>
</body>
</html>
