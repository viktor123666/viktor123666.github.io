<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Which Scalelist Character Are You?</title>
<meta property="og:title" content="Which Scalelist Universe Character Are You?">
<meta property="og:description" content="Take the quiz and discover your soul alignment in the Scalelist Universe.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--panel:#0d0d1a;--border:#1a1a2e;--gold:#c9a84c;--text:#d4c9a8;--dim:#666;
--vigolas:#c9a84c;--rougeina:#ff4444;--trollmage:#bb8fce;--kompis:#f8c471;--smurjan:#6c5ce7}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:20px}
.progress{height:4px;background:#111;border-radius:2px;margin:20px 0;overflow:hidden}
.progress .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--rougeina));transition:width .5s;border-radius:2px}
.header{text-align:center;padding:40px 0 20px}
.header h1{font-size:28px;background:linear-gradient(135deg,var(--gold),var(--rougeina));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--dim);font-size:14px;margin-top:8px}
.question{display:none;animation:fadeIn .5s}
.question.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-size:12px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.q-text{font-size:20px;font-weight:600;margin-bottom:24px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 18px;cursor:pointer;font-size:14px;transition:.2s;position:relative;overflow:hidden}
.opt:hover{border-color:var(--gold);transform:translateX(4px)}
.opt:hover::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.opt .char-hint{display:none}
#result{display:none;text-align:center;animation:fadeIn .8s}
.result-card{background:var(--panel);border:2px solid var(--gold);border-radius:16px;padding:32px;margin:20px 0;position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(201,168,76,.1),transparent 70%)}
.result-card .char-icon{width:80px;height:80px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900}
.result-card h2{font-size:28px;margin-bottom:4px}
.result-card .title{font-size:14px;color:var(--dim);margin-bottom:16px}
.result-card .desc{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:20px}
.result-card .power{background:#0a0a14;border-radius:8px;padding:12px;font-size:13px;color:var(--gold);margin-bottom:16px}
.radar{width:280px;height:280px;margin:20px auto}
.buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.btn{padding:10px 24px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.2s}
.btn-gold{background:var(--gold);color:var(--bg)}.btn-gold:hover{opacity:.8}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--gold)}
.share-row{display:flex;gap:8px;justify-content:center;margin-top:16px}
.share-btn{padding:6px 14px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--panel);color:var(--text)}.share-btn:hover{border-color:var(--gold)}
.breakdown{margin:20px 0}
.breakdown h3{font-size:14px;color:var(--gold);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12px}
.bar-row .name{width:90px;text-align:right}
.bar-row .bar{flex:1;height:8px;background:#111;border-radius:4px;overflow:hidden}
.bar-row .bar .fill{height:100%;border-radius:4px;transition:width 1s}
.bar-row .pct{width:35px;text-align:right;color:var(--dim)}
a.back{position:fixed;top:16px;left:16px;color:var(--dim);text-decoration:none;font-size:12px;z-index:10}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<a href="/" class="back">< Home</a>
<div class="wrap">
<div class="header"><h1>Which Scalelist Character Are You?</h1><p>12 questions to discover your soul alignment</p></div>
<div class="progress"><div class="fill" id="progressFill" style="width:0%"></div></div>
<div id="questions"></div>
<div id="result"></div>
</div>
<script>
const Q=[
{q:"A powerful enemy stands before you. Your first move?",opts:[
{t:"Command reality itself to obey me",c:"V"},{t:"Phase into shadow and strike unseen",c:"R"},
{t:"Cast 10,000 spells simultaneously",c:"T"},{t:"Read their soul and find the connection",c:"K"},{t:"Let all three voices inside me decide",c:"S"}]},
{q:"What drives you more than anything?",opts:[
{t:"Duty and preserving the balance of existence",c:"V"},{t:"Avenging those who were taken from me",c:"R"},
{t:"Understanding every possible form of magic",c:"T"},{t:"Making sure no one feels invisible",c:"K"},{t:"Silencing the eternal hunger within",c:"S"}]},
{q:"You discover a hidden room with a mysterious artifact. You...",opts:[
{t:"Seal it. Some things must stay locked away",c:"V"},{t:"Phase through it to see what's really inside",c:"R"},
{t:"MACRO BIND it immediately — study later",c:"T"},{t:"Check its value — could be worth a fortune",c:"K"},{t:"...consume it. I must know what it tastes like",c:"S"}]},
{q:"Your greatest fear?",opts:[
{t:"Losing control of the powers I'm trusted with",c:"V"},{t:"Being anchored — trapped in one place forever",c:"R"},
{t:"A world without magic",c:"T"},{t:"That no one truly sees me for who I am",c:"K"},{t:"That the hunger will never stop",c:"S"}]},
{q:"How do your friends describe you?",opts:[
{t:"The one who always takes charge, sometimes too much",c:"V"},{t:"Hard to find, but always there when it matters",c:"R"},
{t:"Brilliant but absolutely unhinged",c:"T"},{t:"The glue that holds everyone together",c:"K"},{t:"...complicated. Very complicated",c:"S"}]},
{q:"Pick a weapon:",opts:[
{t:"A golden pen that rewrites reality",c:"V"},{t:"Twin crystalline blades that cut through dimensions",c:"R"},
{t:"A staff that channels every element at once",c:"T"},{t:"A collection of legendary guns, each with a soul",c:"K"},{t:"My own body — it devours everything",c:"S"}]},
{q:"Someone you care about is in danger. What do you do?",opts:[
{t:"Use my authority to decree their protection",c:"V"},{t:"Appear from nowhere and eliminate the threat silently",c:"R"},
{t:"Unleash raw, uncontrolled magical devastation",c:"T"},{t:"Activate Protocol Zero — stop EVERYTHING",c:"K"},{t:"The three of us will vote... then act as one",c:"S"}]},
{q:"What kind of music speaks to your soul?",opts:[
{t:"Ancient drums and deep ceremonial chanting",c:"V"},{t:"Haunting, ethereal melodies from the shadows",c:"R"},
{t:"Chaotic electronic mixed with orchestral swells",c:"T"},{t:"Warm acoustic with a rich, layered beat",c:"K"},{t:"Three different songs playing at once, somehow harmonizing",c:"S"}]},
{q:"Your ideal Saturday night?",opts:[
{t:"Studying ancient texts by candlelight",c:"V"},{t:"Exploring abandoned places most people can't reach",c:"R"},
{t:"Running 47 experiments simultaneously",c:"T"},{t:"Surrounded by friends, making everyone feel seen",c:"K"},{t:"Arguing with myself about what to eat",c:"S"}]},
{q:"What's your relationship with power?",opts:[
{t:"I was chosen for it. I carry it as a burden",c:"V"},{t:"I took it. One architect at a time",c:"R"},
{t:"I CRAVE it. Every spell, every formula, GIVE ME MORE",c:"T"},{t:"I don't care about power — I care about people",c:"K"},{t:"Power is... all three of us. We ARE power",c:"S"}]},
{q:"The universe is about to end. Your final act?",opts:[
{t:"Write one last command: SAVE",c:"V"},{t:"Phase into the next dimension. I'll survive",c:"R"},
{t:"MACRO BIND: UNIVERSE BACKUP — cast it a million times",c:"T"},{t:"Hold everyone's hand. If we go, we go together",c:"K"},{t:"Devour the apocalypse itself",c:"S"}]},
{q:"Pick a quote that resonates with you:",opts:[
{t:"\"The pen writes what must be written.\"",c:"V"},{t:"\"I exist between what is and what was.\"",c:"R"},
{t:"\"More spells. Always more spells.\"",c:"T"},{t:"\"Everyone deserves to be seen.\"",c:"K"},{t:"\"We vote. Two of three. Always.\"",c:"S"}]}
];
const CHARS={
V:{name:"Vigolas",title:"The Black Soul King",color:"#c9a84c",
desc:"You are a born leader with the weight of worlds on your shoulders. Like Vigolas, you carry immense power with deep responsibility. You speak with authority but act with wisdom. People look to you in crisis because you radiate calm control. Your soul is ancient — you've seen patterns others miss.",
power:"HADOM Codex: Black Soul — Administrator-level reality scripting. Commands: Compact, Erase, Remove, Recreate, Despawn."},
R:{name:"Rougeina",title:"The Phantomic Elf / 13th Architect Assassin",color:"#ff4444",
desc:"You move through life like a phantom — present when needed, invisible when not. Like Rougeina, you're fiercely independent and calculating. Beneath your sharp exterior lies deep emotion you rarely show. You fight for justice in your own way, and your precision is unmatched.",
power:"HADOM Codex: Instant Transaction — Phase-shift between dimensions. Zero Witness: erase all memory of your presence."},
T:{name:"Trollmage",title:"The Prismatic Troll / Silver Elf Hybrid",color:"#bb8fce",
desc:"Your mind is a beautiful chaos of brilliance and raw power. Like Trollmage, you're obsessed with knowledge and pushing boundaries. You alternate between scholarly insight and wild energy. Some call you unhinged — you call it creative. Your potential is literally limitless.",
power:"HADOM Codex: Macrofication — Bind spells into mana-efficient autocasters. 1,000,000 fireballs simultaneously."},
K:{name:"Kompis",title:"The Soul Connector / Richest Gunman",color:"#f8c471",
desc:"You are the heart of every group. Like Kompis, you have a supernatural ability to make people feel truly seen. You collect experiences (and maybe a few nice things) along the way. You're warm, genuine, and surprisingly deep. Connection isn't just your power — it's your purpose.",
power:"HADOM Codex: Subtick Billionaire — 1 billion actions per tick. Protocol Zero: the only ability that can stop a war mid-battle."},
S:{name:"Smurjan",title:"The Void Trinity (Bakasura + Kali Fused)",color:"#6c5ce7",
desc:"You contain multitudes — literally. Like Smurjan, you have multiple sides constantly debating inside you. You're the calm anchor, the fierce striker, and the ancient hunger all at once. Others find you complex; you find yourself fascinating. Your strength IS your internal diversity.",
power:"Three souls voting 2-of-3. Kabasura Manifest: Most powerful 30 seconds of any entity in the universe."}
};
let current=0,scores={V:0,R:0,T:0,K:0,S:0};
function render(){
 let qDiv=document.getElementById('questions');qDiv.innerHTML='';
 Q.forEach((q,i)=>{
  let d=document.createElement('div');
  d.className='question'+(i===current?' active':'');
  d.innerHTML=`<div class="q-num">Question ${i+1} of ${Q.length}</div><div class="q-text">${q.q}</div><div class="options">${q.opts.map((o,j)=>`<div class="opt" onclick="answer(${i},'${o.c}',this)">${o.t}</div>`).join('')}</div>`;
  qDiv.appendChild(d);
 });
 document.getElementById('progressFill').style.width=(current/Q.length*100)+'%';
}
function answer(qi,char,el){
 scores[char]++;
 el.style.borderColor=CHARS[char].color;el.style.background='rgba(201,168,76,0.1)';
 setTimeout(()=>{
  current++;
  if(current>=Q.length){showResult()}else{render()}
 },400);
}
function showResult(){
 document.getElementById('questions').style.display='none';
 document.getElementById('progressFill').style.width='100%';
 let max=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
 let winner=CHARS[max[0][0]];
 let total=Object.values(scores).reduce((a,b)=>a+b,0);
 let r=document.getElementById('result');r.style.display='block';
 r.innerHTML=`
  <div class="result-card" style="border-color:${winner.color}">
   <div class="char-icon" style="background:${winner.color};color:#050508">${winner.name[0]}</div>
   <h2 style="color:${winner.color}">${winner.name}</h2>
   <div class="title">${winner.title}</div>
   <div class="desc">${winner.desc}</div>
   <div class="power">${winner.power}</div>
  </div>
  <div class="breakdown"><h3>Your Soul Alignment</h3>
  ${max.map(([k,v])=>{let c=CHARS[k];let pct=Math.round(v/total*100);return`
   <div class="bar-row"><span class="name">${c.name}</span><div class="bar"><div class="fill" style="width:${pct}%;background:${c.color}"></div></div><span class="pct">${pct}%</span></div>`}).join('')}
  </div>
  <div class="share-row">
   <button class="share-btn" onclick="window.open('https://twitter.com/intent/tweet?text=I%20am%20${winner.name}%20in%20Scalelist%20Universe!%20Take%20the%20quiz:%20'+location.href)">Share on X</button>
   <button class="share-btn" onclick="navigator.clipboard.writeText('I am ${winner.name} (${winner.title}) in Scalelist Universe! Take the quiz: '+location.href)">Copy Result</button>
  </div>
  <div class="buttons">
   <button class="btn btn-gold" onclick="location.href='/manga'">Read ${winner.name}'s Story</button>
   <button class="btn btn-outline" onclick="scores={V:0,R:0,T:0,K:0,S:0};current=0;document.getElementById('result').style.display='none';document.getElementById('questions').style.display='block';render()">Take Again</button>
  </div>`;
 // Animate bars
 setTimeout(()=>{document.querySelectorAll('.bar-row .fill').forEach(f=>{f.style.transition='width 1s';})},100);
}
// Particles
const cv=document.getElementById('particles'),cx=cv.getContext('2d');
function resizeCanvas(){cv.width=innerWidth;cv.height=innerHeight}
resizeCanvas();addEventListener('resize',resizeCanvas);
let pts=Array.from({length:40},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1,a:Math.random()*.3+.1}));
function drawParticles(){
 cx.clearRect(0,0,cv.width,cv.height);
 pts.forEach(p=>{
  p.x+=p.vx;p.y+=p.vy;
  if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;
  if(p.y<0)p.y=cv.height;if(p.y>cv.height)p.y=0;
  cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
  cx.fillStyle=`rgba(201,168,76,${p.a})`;cx.fill();
 });
 requestAnimationFrame(drawParticles);
}
drawParticles();
render();
</script>
</body>
</html>
