<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Atlas — Maps of the Nine Realms | Scalelist Universe</title>
<meta name="description" content="The interactive atlas of the Scalelist Universe — twelve maps of cities, sacred sites and wilds, drawn from canon. Zoom, pan, and click any place to read its story.">
<link rel="stylesheet" href="/su.css">
<script defer src="/su.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  .at-head{text-align:center;padding:2.2rem 1.2rem .6rem;}
  .at-head h1{font-family:var(--font-display);font-size:clamp(1.8rem,4.5vw,2.7rem);color:#fff;letter-spacing:.06em;}
  .at-head .su-kicker{margin-bottom:.5rem;}
  .realmbar{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;max-width:900px;margin:1rem auto 0;}
  .rchip{cursor:pointer;font-size:.72rem;font-weight:700;letter-spacing:.05em;padding:.4rem .85rem;border-radius:999px;
    border:1px solid var(--border);color:var(--text-dim);background:transparent;transition:all .18s;}
  .rchip.on,.rchip:hover{color:#fff;border-color:var(--c);background:color-mix(in srgb,var(--c) 18%,transparent);}

  .at-stage{display:grid;grid-template-columns:1fr 320px;gap:1rem;max-width:1320px;margin:1.2rem auto 0;padding:0 1rem;}
  @media(max-width:900px){.at-stage{grid-template-columns:1fr;}}
  #mapwrap{position:relative;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
    background:var(--void);height:min(66vh,560px);}
  #mapwrap svg{width:100%;height:100%;cursor:grab;display:block;}
  #mapwrap svg:active{cursor:grabbing;}
  .city,.sacred{cursor:pointer;}
  .mlabel{font-family:var(--font-display);font-size:11px;fill:#fff;paint-order:stroke;stroke:rgba(5,5,9,.9);stroke-width:3px;pointer-events:none;}
  .ctrl{position:absolute;top:.6rem;right:.6rem;display:flex;gap:.4rem;}
  .ctrl button{width:32px;height:32px;background:rgba(8,9,18,.8);border:1px solid var(--border);color:var(--gold);border-radius:8px;cursor:pointer;font-size:1rem;backdrop-filter:blur(4px);}
  .corkbadge{position:absolute;left:.6rem;bottom:.6rem;display:flex;align-items:center;gap:.5rem;background:rgba(8,9,18,.8);
    border:1px solid var(--border);border-radius:999px;padding:.35rem .8rem;font-size:.74rem;color:var(--text-dim);backdrop-filter:blur(4px);}
  .corkbadge b{color:var(--gold);}

  /* side panel */
  .at-side{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;align-self:start;}
  .at-side .sub{color:var(--c,var(--gold));font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;}
  .at-side h2{color:#fff;font-size:1.5rem;margin:.1rem 0 .5rem;}
  .at-side .desc{color:var(--text-dim);font-size:.9rem;line-height:1.6;}
  .at-side .facts{display:flex;flex-direction:column;gap:.35rem;margin:.9rem 0;}
  .at-side .facts span{font-size:.8rem;color:var(--text-dim);} .at-side .facts b{color:var(--c,var(--gold));}
  .at-side details{margin-top:.6rem;border-top:1px solid var(--border);padding-top:.6rem;}
  .at-side summary{cursor:pointer;color:var(--gold);font-size:.8rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
  .at-side details p{color:var(--text-dim);font-size:.85rem;line-height:1.6;margin-top:.5rem;}

  /* place popup */
  .place{margin-top:.9rem;border:1px solid var(--c2,var(--border-bright));border-radius:var(--radius-sm);
    background:var(--panel-solid);padding:1rem;display:none;}
  .place.show{display:block;animation:su-fade-up .35s both;}
  .place .pk{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--c2,var(--gold));}
  .place h3{color:#fff;font-size:1.15rem;margin:.15rem 0;}
  .place .role{color:var(--c2,var(--gold));font-size:.82rem;font-weight:700;}
  .place .note{color:var(--text);font-size:.86rem;margin:.4rem 0;}
  .place .lore{color:var(--text-dim);font-size:.82rem;font-style:italic;line-height:1.6;}
  .at-foot{max-width:900px;margin:1.4rem auto 0;text-align:center;color:var(--text-dim);font-size:.84rem;}
</style>
</head>
<body>

<div class="at-head">
  <div class="su-kicker">Maps of the realms · drawn from canon</div>
  <h1>The Atlas</h1>
</div>
<div class="realmbar" id="realmbar"></div>

<div class="at-stage">
  <div id="mapwrap">
    <div class="ctrl"><button id="zin">+</button><button id="zout">−</button><button id="zfit">⟲</button></div>
    <div class="corkbadge" title="Ferdinand's shed bark is legal tender">◉ <b>Cork Coins</b> — the currency of the realms</div>
    <svg id="map" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <aside class="at-side" id="side">
    <div class="sub" id="s-sub"></div><h2 id="s-name"></h2>
    <div class="desc" id="s-desc"></div>
    <div class="facts" id="s-facts"></div>
    <details><summary>Life in this realm</summary><p id="s-life"></p></details>
    <div class="place" id="place"></div>
  </aside>
</div>

<p class="at-foot">The atlas is drawn live from the realm files. Want the big picture? Visit <a href="/cosmos">the Cosmos</a>. The Arrival Fields around <b>Helios Gate City</b> are the first playable zone of the coming MMORPG.</p>

<script>
const REALMS=[
 {id:"scalelist",n:"Scalelist",c:"#c9a84c"},{id:"helios",n:"Helios",c:"#00ff88"},{id:"astralis",n:"Astralis",c:"#ff3366"},
 {id:"codexia",n:"Codexia",c:"#9933ff"},{id:"heartbeat",n:"Heartbeat",c:"#ffaa00"},{id:"trinity",n:"Trinity",c:"#00aaff"},
 {id:"thanatos",n:"Thanatos",c:"#a78bfa"},{id:"null",n:"The Null",c:"#e5e7eb"},{id:"void2",n:"Void-II",c:"#cdb878"},
 {id:"lumen",n:"Lumen",c:"#fbbf24"},{id:"echo",n:"Echo",c:"#67e8f9"},{id:"horizon",n:"Horizon",c:"#38bdf8"},
];
const cache={};
const bar=document.getElementById("realmbar");
const svg=d3.select("#map"), g=svg.append("g");
const zoom=d3.zoom().scaleExtent([.5,5]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);
const S={sub:document.getElementById("s-sub"),name:document.getElementById("s-name"),desc:document.getElementById("s-desc"),
  facts:document.getElementById("s-facts"),life:document.getElementById("s-life"),place:document.getElementById("place"),side:document.getElementById("side")};

REALMS.forEach((r,i)=>{ const b=document.createElement("button"); b.className="rchip"+(i===0?" on":""); b.textContent=r.n;
  b.style.setProperty("--c",r.c); b.dataset.id=r.id;
  b.addEventListener("click",()=>{document.querySelectorAll(".rchip").forEach(x=>x.classList.toggle("on",x===b));load(r);}); bar.appendChild(b); });

async function getMap(id){ if(cache[id])return cache[id];
  const r=await fetch(`/cosmos/maps/${id}.json`); if(!r.ok)throw new Error("no map"); const j=await r.json(); cache[id]=j; return j; }

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}

async function load(realm){
  let m; try{ m=await getMap(realm.id); }catch{ g.html(`<text x="800" y="450" text-anchor="middle" fill="#6b6555" font-size="20">map unavailable</text>`); return; }
  const c=m.color||realm.c; S.side.style.setProperty("--c",c);
  S.sub.textContent=m.subtitle||""; S.name.textContent=m.name||realm.n; S.desc.textContent=m.description||"";
  S.facts.innerHTML=`<span>Ruler <b>${esc(m.ruler||"—")}</b></span><span>HADOM <b>${esc(m.tick||"—")}</b></span><span>Gate <b>${esc(m.gate||"—")}</b></span>`;
  const L=m.life||{}; S.life.textContent=[L.inhabitants,L.phenomenon,L.culture,L.signature_item].filter(Boolean).join("  •  ")||"—";
  S.place.classList.remove("show");
  drawMap(m,c);
  svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity);
}

function drawMap(m,c){
  let s="";
  // ocean / bg
  s+=`<rect x="0" y="0" width="1600" height="900" fill="${m.bg_color||m.ocean_color||"#050509"}"/>`;
  if(m.deep_ocean_color) s+=`<rect x="0" y="0" width="1600" height="900" fill="url(#og)"/>`;
  // rivers (under land highlight)
  (m.rivers||[]).forEach(r=>{ s+=`<path d="${r.path}" fill="none" stroke="${r.color||"#4a9ad0"}" stroke-width="${r.width||3}" stroke-linecap="round" opacity="0.8"/>`; });
  // land
  if(m.land_polygon) s+=`<path d="${m.land_polygon}" fill="${m.land_color||"#243018"}" stroke="${m.land_highlight||c}" stroke-width="2" opacity="0.96"/>`;
  // forests
  (m.forests||[]).forEach(f=>{ const[x,y]=f.center; s+=`<circle cx="${x}" cy="${y}" r="${f.radius||60}" fill="${f.tree_color||"#3a5a28"}" opacity="0.32"/>`;
    for(let i=0;i<7;i++){const a=i/7*6.28,rr=(f.radius||60)*0.6; s+=`<circle cx="${x+Math.cos(a)*rr}" cy="${y+Math.sin(a)*rr}" r="7" fill="${f.tree_color||"#3a5a28"}" opacity="0.6"/>`;} });
  // mountains
  (m.mountain_ranges||[]).forEach(mr=>{ (mr.points||[]).forEach(p=>{ const[x,y]=p,z=mr.size||28;
    s+=`<path d="M ${x-z} ${y+z*0.5} L ${x} ${y-z} L ${x+z} ${y+z*0.5} Z" fill="${mr.color||"#6a6a78"}"/>`;
    s+=`<path d="M ${x-z*0.4} ${y-z*0.2} L ${x} ${y-z} L ${x+z*0.4} ${y-z*0.2} Z" fill="${mr.snow_color||"#eee"}" opacity="0.9"/>`; }); });
  // roads
  (m.roads||[]).forEach(r=>{ s+=`<path d="${r.path}" fill="none" stroke="${r.color||"#b89b60"}" stroke-width="2" stroke-dasharray="6 6" opacity="0.6"/>`; });
  // backdrop (trusted canon svg)
  if(m.backdrop) s+=`<g opacity="0.9">${m.backdrop}</g>`;
  g.html(`<defs><radialGradient id="og" cx="50%" cy="45%" r="70%"><stop offset="55%" stop-color="${m.ocean_color||"#0a1a2a"}" stop-opacity="0"/><stop offset="100%" stop-color="${m.deep_ocean_color||"#020818"}"/></radialGradient></defs>`+s);

  // sacred sites
  (m.sacred_sites||[]).forEach(p=>{ const col=p.color||m.sacred_color||"#ffeab0";
    const node=document.createElementNS("http://www.w3.org/2000/svg","g"); node.setAttribute("class","sacred"); node.setAttribute("transform",`translate(${p.x},${p.y})`);
    node.innerHTML=`<circle r="9" fill="${col}" opacity="0.25"/><text y="5" text-anchor="middle" font-size="16" fill="${col}">✦</text>`;
    node.addEventListener("click",()=>place("Sacred site",p.name,"",p.note,p.lore,col)); g.node().appendChild(node); });
  // cities
  (m.cities||[]).forEach(p=>{ const col=m.city_color||c, big=p.tier==="capital";
    const node=document.createElementNS("http://www.w3.org/2000/svg","g"); node.setAttribute("class","city"); node.setAttribute("transform",`translate(${p.x},${p.y})`);
    node.innerHTML=`<circle r="${big?8:5}" fill="${col}" stroke="#0a0b16" stroke-width="1.5"/>${big?`<circle r="13" fill="none" stroke="${col}" stroke-width="1" opacity="0.6"/>`:""}<text class="mlabel" x="0" y="${big?-16:-10}" text-anchor="middle">${esc(p.name)}</text>`;
    node.addEventListener("click",()=>place(p.tier||"city",p.name,p.role,p.note,p.lore,col)); g.node().appendChild(node); });
}

function place(kind,name,role,note,lore,col){
  S.place.style.setProperty("--c2",col||"#c9a84c");
  S.place.innerHTML=`<div class="pk">${esc(kind)}</div><h3>${esc(name)}</h3>${role?`<div class="role">${esc(role)}</div>`:""}
    ${note?`<div class="note">${esc(note)}</div>`:""}${lore?`<div class="lore">${esc(lore)}</div>`:""}`;
  S.place.classList.add("show"); S.place.scrollIntoView({behavior:"smooth",block:"nearest"});
}

document.getElementById("zin").onclick=()=>svg.transition().call(zoom.scaleBy,1.4);
document.getElementById("zout").onclick=()=>svg.transition().call(zoom.scaleBy,.7);
document.getElementById("zfit").onclick=()=>svg.transition().call(zoom.transform,d3.zoomIdentity);

load(REALMS[0]);
</script>
</body>
</html>
