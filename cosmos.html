<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Scalelist Cosmos — Ferdinand, The Taurus Tree</title>
<meta name="description" content="Ferdinand, the cork oak that holds the universe. WebGL 3D interactive cosmology of the Scalelist Universe — the nine realms on the HADOM branches.">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --gold:#c9a84c;
    --void:#030306;
    --panel:#0a0a14;
    --panel-border:rgba(201,168,76,0.3);
    --text:#d4c9a8;
    --dim:#7a7060;
    --cork:#8b5e3c;
  }
  html,body{height:100%;overflow:hidden;background:#000;color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none;}

  /* Nebula gradient background */
  .nebula{position:fixed;inset:0;z-index:0;pointer-events:none;background:
    radial-gradient(ellipse at 20% 20%, rgba(153,51,255,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 30%, rgba(255,51,102,0.10) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 85%, rgba(0,170,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 30% 70%, rgba(0,255,136,0.06) 0%, transparent 45%),
    radial-gradient(ellipse at 70% 55%, rgba(255,170,0,0.05) 0%, transparent 50%),
    #030306;}

  /* WebGL canvas container */
  #three-canvas{position:fixed;inset:0;z-index:1;}
  #three-canvas canvas{display:block;width:100%;height:100%;cursor:grab;}
  #three-canvas.grabbing canvas{cursor:grabbing;}

  /* Labels container — CSS2D rendered on top */
  #labels-layer{position:fixed;inset:0;z-index:5;pointer-events:none;}
  .realm-label{position:absolute;transform:translate(-50%, 28px);text-align:center;white-space:nowrap;pointer-events:auto;cursor:pointer;transition:opacity 0.25s;}
  .realm-label .rn{font-size:14px;font-weight:700;color:#fff;letter-spacing:0.18em;text-shadow:0 0 10px rgba(0,0,0,0.9), 0 0 4px currentColor;}
  .realm-label .rs{font-size:9px;color:var(--dim);letter-spacing:0.18em;text-transform:uppercase;margin-top:3px;}
  .realm-label:hover .rn{color:currentColor;}

  .ferdinand-label{position:absolute;transform:translate(-50%, -50%);text-align:center;pointer-events:none;}
  .ferdinand-label .big{font-size:34px;letter-spacing:0.3em;font-weight:700;color:var(--gold);text-shadow:0 0 24px rgba(201,168,76,0.75);}
  .ferdinand-label .small{font-size:11px;letter-spacing:0.3em;color:var(--cork);margin-top:4px;opacity:0.85;}

  /* Top bar */
  header{position:fixed;top:0;left:0;right:0;z-index:20;padding:14px 24px;display:flex;align-items:center;gap:20px;background:linear-gradient(to bottom, rgba(5,5,8,0.92), rgba(5,5,8,0));}
  header h1{font-size:1.15rem;color:var(--gold);letter-spacing:0.08em;font-weight:700;text-transform:uppercase;}
  header h1 span{color:#fff;}
  header nav{margin-left:auto;display:flex;gap:16px;}
  header nav a{color:var(--dim);font-size:0.82rem;text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;}
  header nav a:hover{color:var(--gold);}

  /* Search */
  .search-wrap{position:fixed;top:62px;left:24px;z-index:19;}
  .search-wrap input{background:rgba(10,10,20,0.85);backdrop-filter:blur(14px);border:1px solid var(--panel-border);color:var(--text);padding:9px 14px 9px 34px;border-radius:8px;font-size:0.85rem;width:280px;outline:none;}
  .search-wrap input:focus{border-color:var(--gold);box-shadow:0 0 14px rgba(201,168,76,0.3);}
  .search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:0.8rem;color:var(--dim);opacity:0.6;}
  #search-results{position:absolute;top:44px;left:0;width:280px;background:rgba(10,10,20,0.96);backdrop-filter:blur(14px);border:1px solid var(--panel-border);border-radius:8px;max-height:320px;overflow-y:auto;display:none;}
  #search-results.open{display:block;}
  #search-results .item{padding:9px 14px;cursor:pointer;font-size:0.82rem;border-bottom:1px solid rgba(201,168,76,0.08);transition:background 0.15s;}
  #search-results .item:hover{background:rgba(201,168,76,0.14);color:#fff;}
  #search-results .item .sub{display:block;font-size:0.7rem;color:var(--dim);margin-top:2px;}

  /* Help + controls */
  .help-pill{position:fixed;bottom:20px;left:24px;z-index:19;background:rgba(10,10,20,0.85);backdrop-filter:blur(14px);border:1px solid var(--panel-border);border-radius:20px;padding:8px 16px;font-size:0.74rem;color:var(--dim);}
  .help-pill span{color:var(--gold);margin:0 4px;font-weight:700;}
  .ctrl-cluster{position:fixed;bottom:20px;right:24px;z-index:19;display:flex;flex-direction:column;gap:6px;}
  .ctrl-cluster button{background:rgba(10,10,20,0.85);backdrop-filter:blur(14px);border:1px solid var(--panel-border);color:var(--gold);width:42px;height:42px;border-radius:10px;font-size:1.2rem;cursor:pointer;transition:all 0.2s;}
  .ctrl-cluster button:hover{background:rgba(201,168,76,0.2);border-color:var(--gold);}

  /* Legend */
  .legend{position:fixed;top:62px;right:24px;z-index:19;background:rgba(10,10,20,0.85);backdrop-filter:blur(14px);border:1px solid var(--panel-border);border-radius:10px;padding:14px 16px;max-width:230px;font-size:0.76rem;}
  .legend h3{font-size:0.68rem;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px;}
  .legend-item{display:flex;align-items:center;gap:8px;margin:6px 0;cursor:pointer;color:var(--dim);transition:color 0.2s;}
  .legend-item:hover{color:#fff;}
  .legend-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor;}

  @media(max-width:800px){
    .legend{display:none;}
    .search-wrap input{width:200px;}
    #drawer{width:92vw !important;}
  }

  /* Drawer */
  #drawer{position:fixed;top:0;right:0;width:420px;max-width:92vw;height:100vh;background:rgba(10,10,20,0.95);backdrop-filter:blur(16px);border-left:1px solid var(--panel-border);z-index:50;transform:translateX(100%);transition:transform 0.42s cubic-bezier(.25,.8,.25,1);overflow-y:auto;}
  #drawer.open{transform:translateX(0);}
  #drawer-header{padding:26px 28px 18px;border-bottom:1px solid var(--panel-border);}
  #drawer-header .close{float:right;cursor:pointer;color:var(--dim);font-size:1.4rem;line-height:1;}
  #drawer-header .close:hover{color:var(--gold);}
  #drawer-header .sub{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--dim);margin-bottom:6px;}
  #drawer-header h2{font-size:1.7rem;color:var(--accent,var(--gold));letter-spacing:0.05em;text-shadow:0 0 14px currentColor;}
  #drawer-body{padding:24px 28px;}
  #drawer-body .field{margin-bottom:16px;}
  #drawer-body .field-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.16em;color:var(--dim);margin-bottom:6px;}
  #drawer-body .field-value{font-size:0.93rem;line-height:1.5;color:var(--text);}
  #drawer-body .desc{font-size:0.9rem;line-height:1.65;color:#e8dfc2;border-left:2px solid var(--accent,var(--gold));padding-left:16px;margin:16px 0;font-style:italic;}
  #drawer-body h3{font-size:0.8rem;text-transform:uppercase;letter-spacing:0.16em;color:var(--accent,var(--gold));margin:22px 0 10px;border-bottom:1px solid var(--panel-border);padding-bottom:6px;}
  .city-item{padding:10px 0;border-bottom:1px solid rgba(201,168,76,0.08);}
  .city-item:last-child{border-bottom:none;}
  .city-item .cname{font-weight:600;color:#fff;font-size:0.88rem;}
  .city-item .crole{font-size:0.73rem;color:var(--accent,var(--gold));text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
  .city-item .cnote{font-size:0.82rem;color:var(--dim);margin-top:4px;line-height:1.5;}

  /* Splash */
  .splash{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.8s ease;}
  .splash.hidden{opacity:0;pointer-events:none;}
  .splash h1{font-size:2.2rem;letter-spacing:0.4em;color:var(--gold);font-weight:700;}
  .splash .sub{font-size:0.8rem;letter-spacing:0.4em;color:var(--cork);text-transform:uppercase;}
  .splash .loader{margin-top:20px;width:200px;height:2px;background:rgba(201,168,76,0.2);border-radius:2px;overflow:hidden;}
  .splash .loader::after{content:'';display:block;width:40%;height:100%;background:var(--gold);animation:load 1.4s ease-in-out infinite;}
  @keyframes load{0%{transform:translateX(-100%);}100%{transform:translateX(350%);}}
</style>
</head>
<body>

<div class="nebula"></div>
<div id="three-canvas"></div>
<div id="labels-layer"></div>

<header>
  <h1>SCALELIST <span>COSMOS</span></h1>
  <nav>
    <a href="/">Hub</a>
    <a href="/cosmos/atlas.html">Atlas</a>
    <a href="/season4.html" style="color:#c9a84c;">Season 4</a>
    <a href="/cosmos/character-chat.html">Speak</a>

</header>

<div class="search-wrap">
  <input id="search" type="text" placeholder="Search realms, cities, Ferdinand…" autocomplete="off">
  <div id="search-results"></div>
</div>

<div class="legend">
  <h3>The Nine Realms</h3>
  <div id="legend-list"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* =========================================================
   THREE.js scene setup
   ========================================================= */
const container = document.getElementById('three-canvas');
const labelsLayer = document.getElementById('labels-layer');

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 1, 10000);
camera.position.set(0, 500, 3000);
camera.lookAt(0, 200, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0); // transparent — nebula bg shows through
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.28));
const keyLight = new THREE.DirectionalLight(0xfff2d0, 1.1);
keyLight.position.set(500, 800, 600);
scene.add(keyLight);
const fillLight = new THREE.PointLight(0xc9a84c, 2.2, 2000, 2);
fillLight.position.set(0, 0, 0);
scene.add(fillLight);
const purpleHaze = new THREE.PointLight(0x9933ff, 0.6, 3000, 2);
purpleHaze.position.set(-800, 200, -800);
scene.add(purpleHaze);
const pinkHaze = new THREE.PointLight(0xff3366, 0.5, 3000, 2);
pinkHaze.position.set(900, -200, -400);
scene.add(pinkHaze);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 400;
controls.maxDistance = 7500;
controls.target.set(0, 200, 0);
controls.rotateSpeed = 0.7;
controls.zoomSpeed = 0.9;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.25; // very slow drift when idle
let autoRotatePaused = false;
container.addEventListener('mousedown', () => { controls.autoRotate = false; autoRotatePaused = true; });
container.addEventListener('mouseup', () => { setTimeout(() => { if(!dragOccurred) { /* keep off */ } }, 100); });

/* =========================================================
   FERDINAND — THE YGGDRASIL WORLD-TREE (classical painted cosmology)
   Flat disk-world at base (Midgard-style), mountains around the rim,
   Jörmungandr-serpent wrapping the trunk, roots into the underworld,
   layered painted canopy clouds, realms SITTING ON branch tips.
   ========================================================= */
const trunkGroup = new THREE.Group();

// Scale factor to push realms outward (so they rest on branches)
const REALM_SCALE = 1.7;

// Procedural painted oak bark (darker / more classical than the neon Erdtree look)
function makeCorkBarkTexture(){
  const c = document.createElement('canvas');
  c.width = 512; c.height = 2048;
  const ctx = c.getContext('2d');
  // Muted painted brown gradient (no neon)
  const g = ctx.createLinearGradient(0, 0, 512, 0);
  g.addColorStop(0, '#261608');
  g.addColorStop(0.3, '#4a2d15');
  g.addColorStop(0.5, '#6b4228');
  g.addColorStop(0.7, '#4a2d15');
  g.addColorStop(1, '#261608');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 512, 2048);
  // Deep furrows (classical oak)
  for(let i = 0; i < 55; i++){
    const x = Math.random() * 512;
    const width = 3 + Math.random() * 16;
    const opacity = 0.3 + Math.random() * 0.5;
    ctx.fillStyle = `rgba(12,6,2,${opacity})`;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    let cx = x;
    for(let y = 0; y < 2048; y += 22){
      cx += (Math.random() - 0.5) * 10;
      ctx.lineTo(cx, y);
    }
    ctx.lineTo(cx + width, 2048);
    for(let y = 2048; y > 0; y -= 22){
      cx += (Math.random() - 0.5) * 10;
      ctx.lineTo(cx, y);
    }
    ctx.closePath();
    ctx.fill();
  }
  // Knotholes (painted tree-eyes)
  for(let i = 0; i < 18; i++){
    const x = Math.random() * 512;
    const y = Math.random() * 2048;
    const r = 12 + Math.random() * 22;
    const rad = ctx.createRadialGradient(x, y, 0, x, y, r);
    rad.addColorStop(0, 'rgba(8,4,2,0.95)');
    rad.addColorStop(0.6, 'rgba(40,24,12,0.7)');
    rad.addColorStop(1, 'rgba(40,24,12,0)');
    ctx.fillStyle = rad;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }
  // Growth rings
  for(let y = 0; y < 2048; y += 40 + Math.random() * 80){
    ctx.strokeStyle = `rgba(30,18,8,${0.4 + Math.random() * 0.3})`;
    ctx.lineWidth = 1.5 + Math.random() * 2.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    for(let x = 0; x < 512; x += 8) ctx.lineTo(x, y + (Math.random() - 0.5) * 8);
    ctx.stroke();
  }
  // Muted highlights (painted, not glowing)
  for(let i = 0; i < 50; i++){
    const x = Math.random() * 512;
    const y = Math.random() * 2048;
    const size = 15 + Math.random() * 35;
    const rad = ctx.createRadialGradient(x, y, 0, x, y, size);
    rad.addColorStop(0, `rgba(140,92,58,${0.08 + Math.random()*0.08})`);
    rad.addColorStop(1, 'rgba(140,92,58,0)');
    ctx.fillStyle = rad;
    ctx.fillRect(x - size, y - size, size * 2, size * 2);
  }
  return new THREE.CanvasTexture(c);
}

const corkTex = makeCorkBarkTexture();
corkTex.wrapS = corkTex.wrapT = THREE.RepeatWrapping;
corkTex.repeat.set(4, 6);

// MAIN TRUNK — Lathe-geometry for an organic classical silhouette
// Wider base (Yggdrasil "foot"), mid taper, slight crown flare
const trunkHeight = 2400;
const trunkProfile = [];
const profileSteps = 40;
for(let i = 0; i <= profileSteps; i++){
  const t = i / profileSteps;
  const y = -trunkHeight * 0.55 + t * trunkHeight;
  let r;
  if(t < 0.12){ r = 160 - t * 300; }
  else if(t < 0.35){ r = 124 - (t - 0.12) * 110; }
  else if(t < 0.78){ r = 98 - (t - 0.35) * 60; }
  else { r = 72 - (t - 0.78) * 40; }
  r += Math.sin(t * Math.PI * 3.5) * 4; // organic bulges
  r = Math.max(50, r);
  trunkProfile.push(new THREE.Vector2(r, y));
}
const trunkGeo = new THREE.LatheGeometry(trunkProfile, 48);
const trunkMat = new THREE.MeshStandardMaterial({
  map: corkTex,
  color: 0x7a4a28,
  emissive: 0x1a0e04,
  emissiveIntensity: 0.08,
  roughness: 0.95,
  metalness: 0.02,
});
const trunk = new THREE.Mesh(trunkGeo, trunkMat);
trunk.name = 'ferdinand-trunk';
trunkGroup.add(trunk);

// =================== THE MIDGARD DISK — flat world at the tree's base ===================
// Classical Yggdrasil: a flat circular world-disk sits at the base supported by the trunk.
// This is where characters, mountains, fjords, and tiny villages live.
const diskY = -trunkHeight * 0.38;
const diskRadius = 780;
const diskGroup = new THREE.Group();
diskGroup.position.y = diskY;

// Procedural painted disk-world texture (oceans + land + forests + runes)
function makeDiskWorldTexture(){
  const c = document.createElement('canvas');
  c.width = 2048; c.height = 2048;
  const ctx = c.getContext('2d');
  // Painted radial: central land → ochre coast → deep ocean → void rim
  const gr = ctx.createRadialGradient(1024, 1024, 0, 1024, 1024, 1024);
  gr.addColorStop(0, '#d4b37a');
  gr.addColorStop(0.45, '#8a6a38');
  gr.addColorStop(0.6, '#3a4a52');
  gr.addColorStop(0.82, '#1f3240');
  gr.addColorStop(1, '#0a1420');
  ctx.fillStyle = gr; ctx.fillRect(0, 0, 2048, 2048);
  // Crosshatched painted-map texture
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 0.6;
  for(let i = 0; i < 800; i++){
    ctx.beginPath();
    const x = Math.random() * 2048;
    const y = Math.random() * 2048;
    const len = 8 + Math.random() * 20;
    const a = Math.random() * Math.PI * 2;
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(a) * len, y + Math.sin(a) * len);
    ctx.stroke();
  }
  // Painted forests (dark green blobs)
  for(let i = 0; i < 150; i++){
    const r = 80 + Math.random() * 500;
    const th = Math.random() * Math.PI * 2;
    const x = 1024 + Math.cos(th) * r;
    const y = 1024 + Math.sin(th) * r;
    const sz = 6 + Math.random() * 18;
    ctx.fillStyle = `rgba(20,48,24,${0.4 + Math.random()*0.3})`;
    ctx.beginPath(); ctx.arc(x, y, sz, 0, Math.PI*2); ctx.fill();
  }
  // Rivers (painted lines weaving from center outward)
  ctx.strokeStyle = 'rgba(80,130,170,0.45)';
  ctx.lineWidth = 2.5;
  for(let i = 0; i < 12; i++){
    const th = (i / 12) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    ctx.beginPath();
    ctx.moveTo(1024, 1024);
    let x = 1024, y = 1024;
    for(let s = 0; s < 30; s++){
      const ang = th + (Math.random() - 0.5) * 0.6;
      x += Math.cos(ang) * 22;
      y += Math.sin(ang) * 22;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  // Rune ring near the edge (painted Yggdrasil glyphs)
  ctx.strokeStyle = 'rgba(201,168,76,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(1024, 1024, 880, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(1024, 1024, 860, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(201,168,76,0.55)';
  ctx.font = 'bold 22px serif';
  ctx.textAlign = 'center';
  const runes = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛜ','ᛞ','ᛟ'];
  for(let i = 0; i < 48; i++){
    const a = (i / 48) * Math.PI * 2;
    const rx = 1024 + Math.cos(a) * 870;
    const ry = 1024 + Math.sin(a) * 870;
    ctx.save(); ctx.translate(rx, ry); ctx.rotate(a + Math.PI / 2);
    ctx.fillText(runes[i % runes.length], 0, 0);
    ctx.restore();
  }
  // Void wash at the rim
  const rimGrad = ctx.createRadialGradient(1024, 1024, 900, 1024, 1024, 1024);
  rimGrad.addColorStop(0, 'rgba(0,0,0,0)');
  rimGrad.addColorStop(1, 'rgba(0,0,0,0.85)');
  ctx.fillStyle = rimGrad; ctx.fillRect(0, 0, 2048, 2048);
  return new THREE.CanvasTexture(c);
}
const diskTex = makeDiskWorldTexture();

// Flat disk (the painted world-plate)
const diskGeo = new THREE.CircleGeometry(diskRadius, 96);
const diskMat = new THREE.MeshStandardMaterial({
  map: diskTex, color: 0xffffff,
  roughness: 0.85, metalness: 0.05, side: THREE.DoubleSide,
});
const disk = new THREE.Mesh(diskGeo, diskMat);
disk.rotation.x = -Math.PI / 2;
diskGroup.add(disk);

// Raised disk rim (world's edge)
const rimGeo = new THREE.TorusGeometry(diskRadius - 4, 12, 12, 96);
const rimMat = new THREE.MeshStandardMaterial({ color: 0x3a2614, roughness: 0.9 });
const rim = new THREE.Mesh(rimGeo, rimMat);
rim.rotation.x = Math.PI / 2;
diskGroup.add(rim);

// MOUNTAINS around the disk perimeter (painted cone clusters)

    for(let x = 0; x < 512; x += 12){
      const offset = (Math.floor(y / 10) % 2) * 6;
      ctx.fillStyle = `rgba(${30 + Math.random()*30},${60 + Math.random()*40},${36 + Math.random()*30},0.9)`;

      ctx.moveTo(x + offset, y);
      ctx.lineTo(x + offset + 6, y + 5);
      ctx.lineTo(x + offset, y + 10);

      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(10,20,12,0.6)'; ctx.lineWidth = 0.5; ctx.stroke();
    }
  }
  return new THREE.CanvasTexture(c);
}

function makeYggdrasilBranch(angle, originY, length, thicknessBase, lift){
  const tipX = Math.cos(angle) * length;
  const tipZ = Math.sin(angle) * length;
  const apexY = originY + length * lift;
  const tipY = originY + length * (lift * 0.8);
  const trunkR = 60;
  const startX = Math.cos(angle) * trunkR;
  const startZ = Math.sin(angle) * trunkR;

  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, originY - 10, 0),
    new THREE.Vector3(startX, originY, startZ),
    new THREE.Vector3(Math.cos(angle) * (trunkR + length * 0.3), originY + length * 0.25, Math.sin(angle) * (trunkR + length * 0.3)),
    new THREE.Vector3(tipX * 0.65, apexY, tipZ * 0.65),
    new THREE.Vector3(tipX * 0.88, apexY * 0.98, tipZ * 0.88),
    new THREE.Vector3(tipX, tipY, tipZ),
  ]);
  const geo = new THREE.TubeGeometry(curve, 50, thicknessBase, 8, false);
  trunkGroup.add(new THREE.Mesh(geo, branchMat));

  // Cloud of foliage at the tip (painted style, not orb)
  const tipPt = curve.getPointAt(1);
  makeFoliageCloud(tipPt.x, tipPt.y + 30, tipPt.z, 70 + Math.random() * 30, canopyCloudMat);

  return { x: tipX, y: tipY, z: tipZ, angle };
}

// Primary vs decorative branches behave differently:
//   primary  → NO foliage cluster at tip (realm will sit there, clean)
//   decorative → foliage cluster at tip (fills silhouette)
function makeYggdrasilBranchClean(angle, originY, length, thicknessBase, lift){
  const tipX = Math.cos(angle) * length;
  const tipZ = Math.sin(angle) * length;
  const apexY = originY + length * lift;
  const tipY = originY + length * (lift * 0.8);
  const trunkR = 60;
  const startX = Math.cos(angle) * trunkR;
  const startZ = Math.sin(angle) * trunkR;
  const curve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, originY - 10, 0),
    new THREE.Vector3(startX, originY, startZ),
    new THREE.Vector3(Math.cos(angle) * (trunkR + length * 0.3), originY + length * 0.25, Math.sin(angle) * (trunkR + length * 0.3)),
    new THREE.Vector3(tipX * 0.65, apexY, tipZ * 0.65),
    new THREE.Vector3(tipX * 0.88, apexY * 0.98, tipZ * 0.88),
    new THREE.Vector3(tipX, tipY, tipZ),
  ]);
  const geo = new THREE.TubeGeometry(curve, 50, thicknessBase, 8, false);
  trunkGroup.add(new THREE.Mesh(geo, branchMat));
  // Small foliage clusters along the branch length (NOT at tip — realms go there)
  const midPt = curve.getPointAt(0.55);
  makeFoliageCloud(midPt.x, midPt.y + 25, midPt.z, 55 + Math.random() * 20, canopyCloudMat);
  return { x: tipX, y: tipY, z: tipZ, angle, length };
}

function hexToInt(h){ return parseInt(h.replace('#',''), 16); }

function lighter(hex, amt = 1.35){
  const h = hex.replace('#','');
  const r = Math.min(255, Math.floor(parseInt(h.substr(0,2),16)*amt));
  const g = Math.min(255, Math.floor(parseInt(h.substr(2,2),16)*amt));
  const b = Math.min(255, Math.floor(parseInt(h.substr(4,2),16)*amt));
  return (r << 16) | (g << 8) | b;
}

function buildRealms(){
  // Bigger spheres so each planet reads clearly against the dense tree silhouette
  const REALM_RADIUS_MUL = 0.72;
  // Scalelist = the flat disk-world at the base — small clickable marker above the disk.
  // The 6 "branch" realms (helios, astralis, codexia, heartbeat, trinity, thanatos)
  // sit PAST their branch tip, above it, clear of any foliage.
  // Null = deep below (underworld). Void-II = above the canopy.
  const branchTips = window.__FERDINAND_BRANCHES || [];
  // 9 realms on the 9 branches. 6 canonical + 3 "uncounted" sub-realms (echo/horizon/lumen).
  const BRANCH_REALMS = ['helios','astralis','codexia','heartbeat','trinity','thanatos','echo','horizon','lumen'];
  const tipAssignments = {};
  for(let i = 0; i < BRANCH_REALMS.length && i < branchTips.length; i++){
    tipAssignments[BRANCH_REALMS[i]] = branchTips[i];
  }
  const rootBaseY2 = -trunkHeight * 0.55;
  const diskY2 = -trunkHeight * 0.38;
  const canopyTopY = trunkHeight * 0.42 + 420;

  for(const r of DATA.realms){
    const radius = (r.radius || 100) * REALM_RADIUS_MUL;
    const geom = new THREE.SphereGeometry(radius, 48, 48);
    const col = hexToInt(r.color);
    const mat = new THREE.MeshStandardMaterial({
      color: col,
      emissive: col,
      emissiveIntensity: 0.55,
      metalness: 0.25,
      roughness: 0.4,
    });
    const mesh = new THREE.Mesh(geom, mat);

    // Position logic:
    //   Scalelist → on the Midgard disk
    //   Null → deep below in the underworld
    //   Void-II → high above the canopy
    //   All others → suspended PAST the branch tip, above it, clearly free of foliage
    let baseX, baseY, baseZ;
    if(r.id === 'scalelist'){
      baseX = 0; baseY = diskY2 + radius + 20; baseZ = 0;
    } else if(r.id === 'null'){
      baseX = 0; baseY = rootBaseY2 - 420; baseZ = 0;
    } else if(r.id === 'void2'){
      baseX = 0; baseY = canopyTopY + 280; baseZ = 0;
    } else {
      const tip = tipAssignments[r.id];
      if(tip){
        // Push outward past the branch tip by (radius + 180) + lift above branch
        const dir = new THREE.Vector3(tip.x, 0, tip.z).normalize();
        const outward = radius + 180;
        baseX = tip.x + dir.x * outward;
        baseY = tip.y + radius + 140;
        baseZ = tip.z + dir.z * outward;
      } else {
        baseX = r.x * REALM_SCALE;
        baseY = -r.y * REALM_SCALE;
        baseZ = (Z_MAP[r.id] || 0) * REALM_SCALE;
      }
    }
    const pos = new THREE.Vector3(baseX, baseY, baseZ);
    mesh.position.copy(pos);
    mesh.userData = r;
    mesh.name = r.id;
    scene.add(mesh);
    realmMeshes.push(mesh);

    // Atmosphere glow sphere (slightly larger, back-side rendered, fresnel-ish)
    const glowGeom = new THREE.SphereGeometry(radius * 1.22, 32, 32);
    const glowMat = new THREE.ShaderMaterial({
      uniforms: { glowColor: { value: new THREE.Color(r.glow || r.color) } },
      vertexShader: `varying vec3 vN; void main(){ vN = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `uniform vec3 glowColor; varying vec3 vN; void main(){ float f = pow(1.0 - abs(vN.z), 2.5); gl_FragColor = vec4(glowColor, f * 0.6); }`,
      transparent: true,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      depthWrite: false,
    });
    const glow = new THREE.Mesh(glowGeom, glowMat);
    glow.position.copy(pos);
    scene.add(glow);

    // Orbital ring (rotating torus around realm)
    const ringGeo = new THREE.TorusGeometry(radius * 1.6, 1.5, 3, 60);
    const ringMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.32 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(pos);
    ring.rotation.x = Math.PI / 2.4;
    ring.userData.spin = 0.004 + Math.random() * 0.004;
    scene.add(ring);
    realmMeshes.push(ring); // track for animation, NOT clickable (filter below)

    // Tether thread: thin silver line from branch-tip to realm (classical world-tree look)
    if(BRANCH_REALMS.includes(r.id)){
      const tip = tipAssignments[r.id];
      if(tip){
        const tipPt = new THREE.Vector3(tip.x, tip.y, tip.z);
        const tetherGeo = new THREE.BufferGeometry().setFromPoints([
          tipPt,
          new THREE.Vector3((tipPt.x + pos.x) / 2, (tipPt.y + pos.y) / 2 + 20, (tipPt.z + pos.z) / 2),
          pos,
        ]);
        const tether = new THREE.Line(
          tetherGeo,
          new THREE.LineBasicMaterial({ color: 0xc9a84c, transparent: true, opacity: 0.55 })
        );
        scene.add(tether);
      }
    }

    // PER-REALM IDENTITY MINIATURE — makes each planet unmistakable in cosmos view
    addCosmosIdentity(r, pos, radius);

    // IDEA #5: Character portrait billboard floating next to the realm
    if(r.character){
      addCharacterPortrait(r, pos, radius);
    }

    // HTML label overlay
    const lbl = document.createElement('div');
    lbl.className = 'realm-label';
    lbl.style.color = r.color;
    lbl.innerHTML = `<div class="rn">${r.name}</div><div class="rs">${r.subtitle||''}</div>`;
    lbl.addEventListener('click', ev => { ev.stopPropagation(); focusRealm(r); });
    labelsLayer.appendChild(lbl);
    realmLabels.push({ el: lbl, pos: pos.clone(), radius });
  }

  // Ferdinand top/bottom labels in 3D too
  const fernTop = document.createElement('div');
  fernTop.className = 'ferdinand-label';
  fernTop.innerHTML = `<div class="big">FERDINAND</div><div class="small">THE TAURUS TREE · KORKEK · WORLD-BOLE</div>`;
  labelsLayer.appendChild(fernTop);
  realmLabels.push({ el: fernTop, pos: new THREE.Vector3(0, 1600, 0), radius: 0, ferdinand: true });

  const fernMid = document.createElement('div');
  fernMid.className = 'ferdinand-label';
  fernMid.innerHTML = `<div class="small" style="color:#c9a84c;opacity:0.85;letter-spacing:0.35em;">MIDGARD — THE PAINTED DISK</div>`;
  labelsLayer.appendChild(fernMid);
  realmLabels.push({ el: fernMid, pos: new THREE.Vector3(0, -trunkHeight * 0.38 - 50, 0), radius: 0, ferdinand: true });

  const fernBot = document.createElement('div');
  fernBot.className = 'ferdinand-label';
  fernBot.innerHTML = `<div class="small" style="color:var(--cork);opacity:0.7;">ROOTED IN NULL · THREE WELLS · REMEMBER FERDINAND FOREVER</div>`;
  labelsLayer.appendChild(fernBot);
  realmLabels.push({ el: fernBot, pos: new THREE.Vector3(0, -trunkHeight * 0.55 - 480, 0), radius: 0, ferdinand: true });
}

/* =========================================================
   CHARACTER PORTRAIT BILLBOARD — floats next to the realm (IDEA #5)
   Uses the LoRA-generated hero portraits from /characters/{id}.png
   ========================================================= */
const textureLoader = new THREE.TextureLoader();
const portraitCache = {};
function addCharacterPortrait(r, pos, radius){
  const id = r.character;
  const portraitPath = `/characters/${id}.png`;
  let tex = portraitCache[id];
  if(!tex){
    tex = textureLoader.load(portraitPath);
    tex.colorSpace = THREE.SRGBColorSpace;
    portraitCache[id] = tex;
  }
  // Billboard plane — slimmer, above the realm
  const portraitW = radius * 1.4;
  const portraitH = radius * 1.9;
  const pMat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false,
  });
  const plane = new THREE.Mesh(new THREE.PlaneGeometry(portraitW, portraitH), pMat);
  // Straight above the realm so it reads clearly
  plane.position.set(pos.x, pos.y + radius + portraitH * 0.6, pos.z);
  plane.userData.isBillboard = true;
  scene.add(plane);
  realmMeshes.push(plane);
  // Soft frame ring behind the portrait
  const frameGeom = new THREE.RingGeometry(portraitW * 0.58, portraitW * 0.64, 48);
  const frameMat = new THREE.MeshBasicMaterial({
    color: hexToInt(r.color), transparent: true, opacity: 0.6, side: THREE.DoubleSide, depthWrite: false,
  });
  const frame = new THREE.Mesh(frameGeom, frameMat);
  frame.position.copy(plane.position);
  frame.position.z -= 1;
  frame.userData.isBillboard = true;
  scene.add(frame);
  realmMeshes.push(frame);
}

/* =========================================================
   PER-REALM COSMOS IDENTITY
   Miniature version of each realm's unique visual identity (seen in globe.html).
   Renders unique 3D elements at the realm's position in the cosmos.
   ========================================================= */
function addCosmosIdentity(r, pos, radius){
  const id = r.id;

  if(id === 'helios'){
    // Tiny upside-down shipwreck floating above the sphere
    const wreck = new THREE.Group();
    const hull = new THREE.Mesh(
      new THREE.BoxGeometry(radius * 0.35, radius * 0.09, radius * 0.15),
      new THREE.MeshStandardMaterial({ color: 0x5a3a1e, roughness: 0.9 })
    );
    wreck.add(hull);
    const mast = new THREE.Mesh(
      new THREE.CylinderGeometry(radius * 0.012, radius * 0.018, radius * 0.3, 6),
      new THREE.MeshStandardMaterial({ color: 0x3a2614, roughness: 0.9 })
    );
    mast.position.set(0, -radius * 0.18, 0);
    wreck.add(mast);
    const sail = new THREE.Mesh(
      new THREE.PlaneGeometry(radius * 0.24, radius * 0.2),
      new THREE.MeshStandardMaterial({ color: 0x8a7858, roughness: 1, side: THREE.DoubleSide, transparent: true, opacity: 0.82 })
    );
    sail.position.set(0, -radius * 0.23, 0);
    sail.rotation.x = Math.PI / 2;
    wreck.add(sail);
    wreck.position.copy(pos);
    wreck.position.y += radius * 1.55;
    wreck.rotation.z = Math.PI; // UPSIDE DOWN
    scene.add(wreck);
  }

  else if(id === 'astralis'){
    // Saturn-style starlight ring
    const ringGeom = new THREE.RingGeometry(radius * 1.5, radius * 2.2, 64, 1);
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 32;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 32);
    grad.addColorStop(0, 'rgba(255,120,180,0)');
    grad.addColorStop(0.5, 'rgba(255,200,200,1)');
    grad.addColorStop(1, 'rgba(255,120,180,0)');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 256, 32);
    ctx.fillStyle = 'rgba(255,255,255,1)';
    for(let i = 0; i < 80; i++){ ctx.globalAlpha = Math.random(); ctx.fillRect(Math.random()*256, Math.random()*32, 1, 1); }
    ctx.globalAlpha = 1;
    const tex = new THREE.CanvasTexture(canvas);
    const ringMat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, opacity: 0.85,
      blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false,
    });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.rotation.x = Math.PI / 2 - 0.25;
    ring.position.copy(pos);
    scene.add(ring);
  }

  else if(id === 'codexia'){
    // 7 tiny violet spires sticking up from the north pole
    for(let i = 0; i < 7; i++){
      const angle = (i / 7) * Math.PI * 2;
      const spire = new THREE.Mesh(
        new THREE.ConeGeometry(radius * 0.04, radius * 0.4, 6),
        new THREE.MeshStandardMaterial({
          color: 0x1a0818, emissive: 0x9933ff, emissiveIntensity: 0.8,
          roughness: 0.4, metalness: 0.6,
        })
      );
      const pr = radius * 0.55;
      spire.position.set(pos.x + pr * Math.cos(angle), pos.y + radius * 0.82, pos.z + pr * Math.sin(angle));
      spire.lookAt(pos);
      spire.rotateX(Math.PI / 2);
      scene.add(spire);
    }
  }

  else if(id === 'heartbeat'){
    // Smoke trail rising from the sphere
    const smokeCount = 30;
    const geom = new THREE.BufferGeometry();
    const p = new Float32Array(smokeCount * 3);
    for(let i = 0; i < smokeCount; i++){
      p[i*3]   = pos.x + (Math.random() - 0.5) * radius * 0.15;
      p[i*3+1] = pos.y + radius * 0.9 + Math.random() * radius * 1.5;
      p[i*3+2] = pos.z + (Math.random() - 0.5) * radius * 0.15;
    }
    geom.setAttribute('position', new THREE.BufferAttribute(p, 3));
    const mat = new THREE.PointsMaterial({
      color: 0xddd0b0, size: radius * 0.04, transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    scene.add(new THREE.Points(geom, mat));
  }

  else if(id === 'trinity'){
    // Two ghost-copies of the sphere in the other two colors, offset slightly
    const colors = [0xf080ff, 0xffa060];
    const offsets = [new THREE.Vector3(radius * 0.35, 0, 0), new THREE.Vector3(-radius * 0.35, 0, 0)];
    for(let i = 0; i < 2; i++){
      const g = new THREE.SphereGeometry(radius * 0.95, 32, 32);
      const m = new THREE.MeshBasicMaterial({
        color: colors[i], transparent: true, opacity: 0.18,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      const mesh = new THREE.Mesh(g, m);
      mesh.position.copy(pos).add(offsets[i]);
      scene.add(mesh);
    }
  }

  else if(id === 'thanatos'){
    // Spiral groove visible on the surface
    const spiralPts = [];
    for(let i = 0; i < 200; i++){
      const t = i / 200;
      const phi = t * Math.PI * 2 * 4;
      const theta = t * Math.PI;
      const sR = radius * 1.005;
      spiralPts.push(new THREE.Vector3(
        pos.x + sR * Math.sin(theta) * Math.cos(phi),
        pos.y + sR * Math.cos(theta),
        pos.z + sR * Math.sin(theta) * Math.sin(phi)
      ));
    }
    const curve = new THREE.CatmullRomCurve3(spiralPts);
    const tube = new THREE.Mesh(
      new THREE.TubeGeometry(curve, 160, radius * 0.015, 5, false),
      new THREE.MeshBasicMaterial({ color: 0x2a2a30, transparent: true, opacity: 0.75 })
    );
    scene.add(tube);
  }

  else if(id === 'null'){
    // Replace the bright orb with a black event horizon + gold accretion disc + a bright pulsing core
    // Hide the main mesh
    const meshIndex = realmMeshes.indexOf(null);
    // find and hide the main realm mesh
    const existingMesh = scene.children.find(c => c.name === 'null' && c.isMesh);
    if(existingMesh) existingMesh.visible = false;

    const horizon = new THREE.Mesh(
      new THREE.SphereGeometry(radius * 0.7, 48, 48),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    horizon.position.copy(pos);
    scene.add(horizon);

    const discGeom = new THREE.RingGeometry(radius * 0.8, radius * 1.4, 128, 1);
    const discMat = new THREE.MeshBasicMaterial({
      color: 0xc9a84c, transparent: true, opacity: 0.45,
      blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false,
    });
    const disc = new THREE.Mesh(discGeom, discMat);
    disc.rotation.x = Math.PI / 2 - 0.2;
    disc.position.copy(pos);
    scene.add(disc);

    // Pulsing core
    const nullCore = new THREE.Mesh(
      new THREE.SphereGeometry(radius * 0.1, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xc9a84c })
    );
    nullCore.position.copy(pos);
    nullCore.userData.nullPulse = true;
    scene.add(nullCore);
    realmMeshes.push(nullCore);
  }

  else if(id === 'void2'){
    // 12 tiny throne marks around the equator + golden seal on top
    for(let i = 0; i < 12; i++){
      const angle = (i / 12) * Math.PI * 2;
      const throne = new THREE.Mesh(
        new THREE.SphereGeometry(radius * 0.035, 10, 10),
        new THREE.MeshStandardMaterial({
          color: i === 11 ? 0x9a2a2a : 0x2a2a30,
          emissive: i === 11 ? 0x9a2a2a : 0x2a2a30,
          emissiveIntensity: 0.5,
        })
      );
      throne.position.set(
        pos.x + radius * 1.03 * Math.cos(angle),
        pos.y,
        pos.z + radius * 1.03 * Math.sin(angle)
      );
      scene.add(throne);
    }
    const seal = new THREE.Mesh(
      new THREE.CylinderGeometry(radius * 0.14, radius * 0.14, radius * 0.03, 24),
      new THREE.MeshStandardMaterial({
        color: 0xc9a84c, emissive: 0xc9a84c, emissiveIntensity: 0.8,
        metalness: 0.7, roughness: 0.2,
      })
    );
    seal.position.set(pos.x, pos.y + radius * 1.02, pos.z);
    scene.add(seal);
  }
}

/* =========================================================
   STARFIELD — 4000 stars in a big sphere shell
   ========================================================= */
function createStars(){
  const count = innerWidth < 700 ? 2000 : 4000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for(let i = 0; i < count; i++){
    const r = 2500 + Math.random() * 1500;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    const isGold = Math.random() < 0.12;
    col[i*3]   = isGold ? 1.0 : 0.82;
    col[i*3+1] = isGold ? 0.88 : 0.7;
    col[i*3+2] = isGold ? 0.6 : 0.4;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size: 3, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  return new THREE.Points(geo, mat);
}
scene.add(createStars());

/* =========================================================
   LABEL PROJECTION — re-sync each frame
   ========================================================= */
const tmp3 = new THREE.Vector3();
function syncLabels(){
  for(const lbl of realmLabels){
    tmp3.copy(lbl.pos);
    tmp3.project(camera);
    const x = (tmp3.x * 0.5 + 0.5) * innerWidth;
    const y = (-tmp3.y * 0.5 + 0.5) * innerHeight;
    const behind = tmp3.z > 1;
    if(behind){
      lbl.el.style.opacity = '0';
      lbl.el.style.pointerEvents = 'none';
    } else {
      lbl.el.style.opacity = '1';
      lbl.el.style.pointerEvents = lbl.ferdinand ? 'none' : 'auto';
    }
    // Offset label below realm by its screen-projected radius-ish
    lbl.el.style.left = x + 'px';
    lbl.el.style.top = y + 'px';
  }
}

/* =========================================================
   CLICK / RAYCAST
   ========================================================= */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downX = 0, downY = 0, dragOccurred = false;

renderer.domElement.addEventListener('pointerdown', e => {
  downX = e.clientX; downY = e.clientY; dragOccurred = false;
});
renderer.domElement.addEventListener('pointermove', e => {
  if(Math.abs(e.clientX - downX) > 4 || Math.abs(e.clientY - downY) > 4){
    dragOccurred = true;
  }
});
renderer.domElement.addEventListener('pointerup', e => {
  if(dragOccurred) return;
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects([heart, ...realmMeshes.filter(m => m.userData && m.userData.id)], false);
  if(hits.length){
    const obj = hits[0].object;
    if(obj.name === 'ferdinand'){
      openFerdinand();
    } else if(obj.userData && obj.userData.id){
      focusRealm(obj.userData);
    }
  }
});

/* =========================================================
   CAMERA FLY-TO REALM
   ========================================================= */
let camFlyTarget = null;
const tmpCamPos = new THREE.Vector3();

function focusRealm(r){
  controls.autoRotate = false;
  autoRotatePaused = true;
  // Find the mesh by realm id — use its actual scene position (the branch tip)
  let pos = null;
  for(const m of realmMeshes){
    if(m.userData && m.userData.id === r.id && m.geometry && m.geometry.type && m.geometry.type.includes('Sphere')){
      pos = m.position.clone();
      break;
    }
  }
  if(!pos){
    pos = new THREE.Vector3(r.x, -r.y, Z_MAP[r.id] || 0);
  }
  const dist = 220 + (r.radius || 100) * 1.0;
  camFlyTarget = {
    target: pos.clone(),
    camPos: pos.clone().add(new THREE.Vector3(0, 60, dist)),
    t: 0,
  };
  document.getElementById('drawer').style.setProperty('--accent', r.color);
  openDrawer(r);
}

function openFerdinand(){
  controls.autoRotate = false;
  autoRotatePaused = true;
  camFlyTarget = {
    target: new THREE.Vector3(0, 200, 0),
    camPos: new THREE.Vector3(0, 500, 3000),
    t: 0,
  };
  openFerdinandDrawer();
}

function resetView(){
  controls.autoRotate = true;
  autoRotatePaused = false;
  camFlyTarget = {
    target: new THREE.Vector3(0, 200, 0),
    camPos: new THREE.Vector3(0, 500, 3000),
    t: 0,
  };
  document.getElementById('drawer').classList.remove('open');
}

const _loreCache = {};
async function fetchLore(realmId){
  if(_loreCache[realmId] !== undefined) return _loreCache[realmId];
  try{
    const res = await fetch('/cosmos/lore/' + realmId + '.json');
    if(!res.ok) throw 0;
    _loreCache[realmId] = await res.json();
  } catch(e){
    _loreCache[realmId] = null;
  }
  return _loreCache[realmId];
}

// Season 4 episode lookup by realm
const _s4Cache = {};
const _s4FilePrefixes = {
  scalelist: '01_scalelist', helios: '02_helios', astralis: '03_astralis',
  codexia: '04_codexia', heartbeat: '05_heartbeat', trinity: '06_trinity',
  thanatos: '07_thanatos', null: '08_null', void2: '09_void2',
  echo: '10_echo', horizon: '11_horizon', lumen: '12_lumen',
};
async function fetchSeason4Episode(realmId){
  if(_s4Cache[realmId] !== undefined) return _s4Cache[realmId];
  const prefix = _s4FilePrefixes[realmId];
  if(!prefix){ _s4Cache[realmId] = null; return null; }
  try{
    const res = await fetch('/season4/episodes/' + prefix + '.json');
    if(!res.ok) throw 0;
    _s4Cache[realmId] = await res.json();
  } catch(e){
    _s4Cache[realmId] = null;
  }
  return _s4Cache[realmId];
}

    a.style.letterSpacing = '0.12em';
    a.style.textTransform = 'uppercase';
    a.style.textAlign = 'center';
    a.style.transition = 'all 0.2s';
    a.onmouseover = () => { a.style.background = `${r.color}44`; a.style.boxShadow = `0 0 16px ${r.color}66`; };
    a.onmouseout = () => { a.style.background = `linear-gradient(135deg, ${r.color}33, ${r.color}11)`; a.style.boxShadow = 'none'; };
    return a;
  };
  exploreRow.appendChild(mkBtn('🗺 2D Map', `/cosmos/realm.html?id=${r.id}`));
  exploreRow.appendChild(mkBtn('🌐 3D Globe', `/cosmos/globe.html?id=${r.id}`));
  dBody.appendChild(exploreRow);

  // Chat with Guardian button (IDEA #1)
  if(r.character){
    const chatBtn = document.createElement('a');
    chatBtn.href = `/su-vault-9x7k/chat.html?char=${r.character}`;
    chatBtn.innerHTML = `💬 Chat with ${r.character.charAt(0).toUpperCase() + r.character.slice(1)} — Guardian of ${r.name}`;
    chatBtn.style.cssText = `display:block;padding:11px 14px;margin-bottom:12px;background:linear-gradient(135deg,${r.color}55,${r.color}22);border:1px solid ${r.color};border-radius:10px;color:${r.color};text-decoration:none;font-size:0.78rem;font-weight:700;letter-spacing:0.08em;text-align:center;transition:all 0.2s;`;
    chatBtn.onmouseover = () => { chatBtn.style.boxShadow = `0 0 18px ${r.color}88`; chatBtn.style.background = `${r.color}66`; };
    chatBtn.onmouseout = () => { chatBtn.style.boxShadow = 'none'; chatBtn.style.background = `linear-gradient(135deg,${r.color}55,${r.color}22)`; };
    dBody.appendChild(chatBtn);
  }

  // IDEA #6: Per-realm ambient music player
  const audioWrap = document.createElement('div');
  audioWrap.style.cssText = `margin-bottom:16px;padding:10px 12px;background:rgba(10,10,20,0.5);border:1px solid ${r.color}55;border-radius:10px;`;
  audioWrap.innerHTML = `
    <div style="font-size:0.68rem;color:${r.color};letter-spacing:0.14em;text-transform:uppercase;margin-bottom:6px;font-weight:600;">♫ Realm theme</div>
    <audio controls preload="none" style="width:100%;height:30px;accent-color:${r.color};" src="/audio/realms/${r.id}.mp3"></audio>`;
  dBody.appendChild(audioWrap);

  if(r.description){
    const d = document.createElement('div');
    d.className = 'desc';
    d.textContent = r.description;
    dBody.appendChild(d);
  }
  const addF = (l, v) => {
    if(!v) return;
    const f = document.createElement('div');
    f.className = 'field';
    f.innerHTML = `<div class="field-label">${l}</div><div class="field-value">${v}</div>`;
    dBody.appendChild(f);
  };
  addF('Ruler', r.ruler);
  addF('HADOM tick-rate', r.tick);
  addF('Gate', r.gate);
  addF('Guardian', r.guardian);
  addF('Access', r.access);
  if(r.cities && r.cities.length){
    const h = document.createElement('h3'); h.textContent = `Cities of ${r.name}`; dBody.appendChild(h);
    for(const c of r.cities){
      const el = document.createElement('div'); el.className = 'city-item';
      // Inhabitants block (if present in inhabitants.json)
      const realmInh = (INHABITANTS && INHABITANTS[r.id]) || {};
      const cityKey = (c.id || c.name || '').toString().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
      const npcs = realmInh[cityKey] || [];
      let npcHtml = '';
      if(npcs.length){
        npcHtml = '<div style="margin-top:8px;padding-top:8px;border-top:1px dashed rgba(201,168,76,0.2);">' +
          '<div style="font-size:0.64rem;letter-spacing:0.16em;color:var(--accent,var(--gold));text-transform:uppercase;margin-bottom:6px;">Inhabitants</div>' +
          npcs.map(n => `<div style="margin:4px 0;padding-left:8px;border-left:2px solid rgba(201,168,76,0.25);"><span style="color:#fff;font-size:0.8rem;font-weight:600;">${n.name}</span> <span style="color:var(--dim);font-size:0.72rem;">· ${n.role||''}</span><div style="font-size:0.73rem;color:var(--dim);margin-top:2px;line-height:1.45;">${n.note||''}</div></div>`).join('') +
          '</div>';
      }
      el.innerHTML = `<div class="cname">${c.name}</div><div class="crole">${c.role||''}</div><div class="cnote">${c.note||''}</div>${npcHtml}`;
      dBody.appendChild(el);
    }
  }
  if(r.id === 'scalelist' && DATA.sacred_sites){
    const h = document.createElement('h3'); h.textContent = 'Sacred Sites'; dBody.appendChild(h);
    for(const s of DATA.sacred_sites){
      const el = document.createElement('div'); el.className = 'city-item';
      el.innerHTML = `<div class="cname">${s.name}</div><div class="cnote">${s.note||''}</div>`;
      dBody.appendChild(el);
    }
  }

  // Open the drawer immediately, then lazy-load the expanded lore
  drawer.classList.add('open');

  // Placeholder for the lore sections (so they render into the right spot)
  const lorePlaceholder = document.createElement('div');
  lorePlaceholder.id = 'lore-placeholder';
  lorePlaceholder.innerHTML = '<div style="padding:14px 0;text-align:center;color:var(--dim);font-size:0.75rem;">Loading deep lore...</div>';
  dBody.appendChild(lorePlaceholder);

  const lore = await fetchLore(r.id);
  if(!lore){
    lorePlaceholder.remove();
    return;
  }
  lorePlaceholder.innerHTML = '';

  const mkDetail = (summary, contentHTML, openByDefault) => {
    const d = document.createElement('details');
    if(openByDefault) d.setAttribute('open','open');
    d.style.cssText = 'margin-top:16px;border:1px solid rgba(201,168,76,0.18);border-radius:10px;background:rgba(10,10,20,0.4);';
    d.innerHTML = `<summary style="cursor:pointer;padding:10px 14px;font-size:0.74rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent,var(--gold));font-weight:700;outline:none;">${summary}</summary><div style="padding:8px 14px 14px;">${contentHTML}</div>`;
    return d;
  };

  // CONTINENTS
  if(lore.continents && lore.continents.length){
    const body = lore.continents.map(c => {
      const placesHTML = (c.places||[]).map(p => `<div style="margin:4px 0 4px 10px;padding-left:8px;border-left:2px solid rgba(201,168,76,0.25);"><span style="color:#fff;font-size:0.78rem;font-weight:600;">${p.name}</span><div style="font-size:0.72rem;color:var(--dim);margin-top:1px;line-height:1.45;">${p.blurb||''}</div></div>`).join('');
      return `<div style="margin-bottom:14px;padding:10px 12px;background:rgba(10,10,20,0.55);border-left:3px solid var(--accent,var(--gold));border-radius:6px;">
        <div style="font-weight:700;color:#fff;font-size:0.92rem;">${c.name}</div>
        <div style="font-size:0.72rem;color:var(--dim);font-style:italic;margin-top:2px;">${c.biome||''}</div>
        <div style="font-size:0.82rem;color:#d4c9a8;margin-top:8px;line-height:1.55;">${c.blurb||''}</div>
        ${placesHTML ? '<div style="margin-top:10px;"><div style="font-size:0.64rem;letter-spacing:0.16em;color:var(--accent,var(--gold));text-transform:uppercase;margin-bottom:4px;">Places</div>' + placesHTML + '</div>' : ''}
      </div>`;
    }).join('');
    dBody.appendChild(mkDetail(`🗺 ${lore.continents.length} Continents`, body, false));
  }

  // TRIBES
  if(lore.tribes && lore.tribes.length){
    const body = lore.tribes.map(t => `
      <div style="margin-bottom:14px;padding:10px 12px;background:rgba(10,10,20,0.55);border-left:3px solid var(--accent,var(--gold));border-radius:6px;">
        <div style="font-weight:700;color:#fff;font-size:0.9rem;">${t.name}</div>
        <div style="font-size:0.72rem;color:var(--dim);font-style:italic;margin-top:2px;">on ${t.continent_id||''}</div>
        <div style="font-size:0.78rem;color:#d4c9a8;margin-top:8px;line-height:1.55;"><b style="color:var(--accent,var(--gold));">Look:</b> ${t.look||''}</div>
        <div style="font-size:0.78rem;color:#d4c9a8;margin-top:4px;line-height:1.55;"><b style="color:var(--accent,var(--gold));">Customs:</b> ${t.customs||''}</div>
        <div style="font-size:0.78rem;color:#d4c9a8;margin-top:4px;line-height:1.55;"><b style="color:var(--accent,var(--gold));">Persona:</b> ${t.persona||''}</div>
      </div>
    `).join('');
    dBody.appendChild(mkDetail(`👥 ${lore.tribes.length} Tribes &amp; Peoples`, body, false));
  }

  // MAJOR CHARACTERS — with portrait + "Chat" link
  if(lore.characters && lore.characters.length){
    const MAIN_PORTRAITS = {
      vigolas_the_administrator: '/characters/vigolas.png',
      rougeina_herself:          '/characters/rougeina.png',
      trollmage_warden:          '/characters/trollmage.png',
      kompis_himself:            '/characters/kompis.png',
      smurjan_fused:             '/characters/smurjan.png',
      smurjan_null_walker:       '/characters/smurjan.png',
    };
    const body = lore.characters.map(c => {
      const portrait = MAIN_PORTRAITS[c.id] || `/characters/npcs/${c.id}.png`;
      return `
      <a href="/cosmos/character-chat.html?char=${c.id}" style="display:flex;gap:10px;margin-bottom:8px;padding:8px 10px;background:rgba(10,10,20,0.4);border-left:2px solid rgba(201,168,76,0.3);border-radius:5px;text-decoration:none;color:inherit;transition:all 0.15s;" onmouseover="this.style.background='rgba(201,168,76,0.12)';" onmouseout="this.style.background='rgba(10,10,20,0.4)';">
        <img src="${portrait}" alt="${c.name}" style="width:56px;height:70px;object-fit:cover;border-radius:4px;flex-shrink:0;background:#1a1a20;" loading="lazy" onerror="this.style.opacity='0.3';this.onerror=null;">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;color:#fff;font-size:0.84rem;">${c.name}</div>
          <div style="font-size:0.68rem;color:var(--accent,var(--gold));letter-spacing:0.08em;margin-top:1px;text-transform:uppercase;">${c.role||''}</div>
          <div style="font-size:0.72rem;color:var(--dim);margin-top:3px;line-height:1.4;">${(c.portrait_blurb||'').slice(0,120)}${(c.portrait_blurb||'').length > 120 ? '...' : ''}</div>
        </div>
        <div style="align-self:center;color:var(--accent,var(--gold));font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;opacity:0.8;">💬</div>
      </a>
      `;
    }).join('');
    dBody.appendChild(mkDetail(`🧍 ${lore.characters.length} Named Characters — click to chat`, body, false));
  }

  // SEASON 4 EVENT (what already happened to this realm in S4)
  const s4 = await fetchSeason4Episode(r.id);
  if(s4){
    const epNum = String(s4.number).padStart(2, '0');
    const body = `
      <a href="/season4.html?ep=${s4.number}" style="display:flex;gap:14px;padding:12px 14px;background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(201,168,76,0.02));border:1px solid rgba(201,168,76,0.3);border-radius:10px;text-decoration:none;color:inherit;transition:all 0.2s;" onmouseover="this.style.background='linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.05))';this.style.transform='translateY(-2px)';" onmouseout="this.style.background='linear-gradient(135deg,rgba(201,168,76,0.1),rgba(201,168,76,0.02))';this.style.transform='translateY(0)';">
        <img src="/season4/covers/episode_${epNum}.png" alt="${s4.title}" style="width:120px;height:67px;object-fit:cover;border-radius:6px;flex-shrink:0;" loading="lazy">
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.66rem;color:var(--accent,var(--gold));letter-spacing:0.16em;text-transform:uppercase;font-weight:700;font-family:'Cinzel','Cormorant Garamond',serif;">Episode ${epNum} · Season 4</div>
          <div style="color:#fff;font-weight:700;font-size:0.95rem;margin-top:3px;">${s4.title}</div>
          <div style="font-size:0.78rem;color:var(--dim);margin-top:6px;line-height:1.5;font-style:italic;">${s4.callout_for_cosmos_drawer || s4.fate_triggered}</div>
          <div style="font-size:0.7rem;color:var(--accent,var(--gold));margin-top:6px;letter-spacing:0.1em;text-transform:uppercase;">Click to read full episode &rarr;</div>
        </div>
      </a>`;
    dBody.appendChild(mkDetail(`📜 Season 4 — what happened here`, body, true));
  }

  // FATE (always open, drama-styled with red accent)
  if(lore.fate){
    const body = `
      <div style="padding:12px 14px;background:rgba(40,10,10,0.5);border-left:3px solid #cc3333;border-radius:6px;">
        <div style="font-size:0.68rem;letter-spacing:0.16em;color:#ff6677;text-transform:uppercase;margin-bottom:6px;font-weight:700;">THREAT</div>
        <div style="font-size:0.85rem;color:#f8dddd;line-height:1.55;margin-bottom:10px;">${lore.fate.threat||''}</div>
        <div style="font-size:0.68rem;letter-spacing:0.16em;color:#ff6677;text-transform:uppercase;margin-bottom:6px;font-weight:700;">CONSEQUENCE</div>
        <div style="font-size:0.82rem;color:#e8c9c9;line-height:1.55;margin-bottom:10px;">${lore.fate.consequence||''}</div>
        <div style="font-size:0.68rem;letter-spacing:0.16em;color:#ff6677;text-transform:uppercase;margin-bottom:6px;font-weight:700;">PROPHECY</div>
        <div style="font-size:0.82rem;color:#fff;font-style:italic;line-height:1.55;margin-bottom:10px;">"${lore.fate.prophecy_line||''}"</div>
        <div style="font-size:0.68rem;letter-spacing:0.16em;color:#ff6677;text-transform:uppercase;margin-bottom:6px;font-weight:700;">DESTROYABLE BY</div>
        <div style="font-size:0.78rem;color:#d4c9a8;line-height:1.5;">${lore.fate.destroyable_by||''}</div>
      </div>`;
    dBody.appendChild(mkDetail(`☠ How this realm ends`, body, true));
  }

  // CULTURAL NOTES — quiet closer
  if(lore.cultural_notes){
    const note = document.createElement('div');
    note.style.cssText = 'margin-top:18px;padding:12px 14px;font-size:0.8rem;color:#d4c9a8;line-height:1.65;font-style:italic;border-top:1px solid rgba(201,168,76,0.15);';
    note.textContent = lore.cultural_notes;
    dBody.appendChild(note);
  }
}

function openFerdinandDrawer(){
  if(!DATA || !DATA.tree) return;
  const t = DATA.tree;
  drawer.style.setProperty('--accent', '#c9a84c');
  dName.textContent = t.name || 'FERDINAND';
  dSub.textContent = t.subtitle || 'The Taurus Tree';
  dBody.innerHTML = '';
  const desc = document.createElement('div');
  desc.className = 'desc';
  desc.textContent = t.tagline || '';
  dBody.appendChild(desc);
  const addF = (l, v) => {
    if(!v) return;
    const f = document.createElement('div');
    f.className = 'field';
    f.innerHTML = `<div class="field-label">${l}</div><div class="field-value">${v}</div>`;
    dBody.appendChild(f);
  };
  addF('Species', t.species || 'Quercus suber (cork oak)');
  addF('Role', 'Holds the entire universe. Connects all nine realms.');
  addF('Nature', 'Taurus (bull-hearted). Refuses to fight. Simply holds.');
  if(t.oath){
    const h = document.createElement('h3'); h.textContent = 'The Ferdinand Oath'; dBody.appendChild(h);
    const d2 = document.createElement('div'); d2.className = 'desc'; d2.textContent = t.oath;
    dBody.appendChild(d2);
  }
  const h2 = document.createElement('h3'); h2.textContent = 'The Cork (korkek)'; dBody.appendChild(h2);
  const p = document.createElement('div');
  p.className = 'field-value';
  p.style.fontSize = '0.88rem'; p.style.lineHeight = '1.65';
  p.innerHTML = `Ferdinand's bark is cork — the only material that regrows when stripped. When the Architects need to reinforce the seal between Scalelist and VOID-II, they harvest a small patch of cork from Ferdinand's trunk. Within one heartbeat, new bark regrows. He does not feel pain. He chose to be helpful.<br><br><em>Remember Ferdinand forever.</em>`;
  dBody.appendChild(p);
  drawer.classList.add('open');
}

document.getElementById('drawer-close').addEventListener('click', resetView);
document.addEventListener('keydown', e => { if(e.key === 'Escape') resetView(); });

/* =========================================================
   LEGEND
   ========================================================= */
function buildLegend(){
  const list = document.getElementById('legend-list');
  list.innerHTML = '';
  const fern = document.createElement('div');
  fern.className = 'legend-item';
  fern.innerHTML = `<span class="dot" style="background:#c9a84c;color:#c9a84c"></span><span style="color:#c9a84c;font-weight:600">FERDINAND (tree)</span>`;
  fern.addEventListener('click', openFerdinand);
  list.appendChild(fern);
  for(const r of DATA.realms){
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<span class="dot" style="background:${r.color};color:${r.color}"></span><span>${r.name}</span>`;
    div.addEventListener('click', () => focusRealm(r));
    list.appendChild(div);
  }
}

/* =========================================================
   SEARCH
   ========================================================= */
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
function buildSearchIndex(){
  if(!DATA) return [];
  const idx = [];
  idx.push({label:'Ferdinand', sub:'The Taurus Tree · Korkek', handler: openFerdinand});
  for(const r of DATA.realms){
    idx.push({label: r.name, sub: r.subtitle, handler: () => focusRealm(r)});
    if(r.cities) for(const c of r.cities){
      idx.push({label: c.name, sub: `in ${r.name} · ${c.role||''}`, handler: () => focusRealm(r)});
    }
  }
  if(DATA.sacred_sites) for(const s of DATA.sacred_sites){
    const r = DATA.realms.find(x => x.id === s.realm);
    idx.push({label: s.name, sub: `sacred site in ${r ? r.name : s.realm}`, handler: () => r && focusRealm(r)});
  }
  return idx;
}
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if(!q){ searchResults.classList.remove('open'); return; }
  const idx = buildSearchIndex();
  const matches = idx.filter(i => i.label.toLowerCase().includes(q) || (i.sub && i.sub.toLowerCase().includes(q)));
  searchResults.innerHTML = '';
  if(!matches.length){
    searchResults.innerHTML = '<div class="item">No results.</div>';
  } else {
    for(const m of matches.slice(0, 14)){
      const d = document.createElement('div');
      d.className = 'item';
      d.innerHTML = `${m.label}<span class="sub">${m.sub || ''}</span>`;
      d.addEventListener('click', () => {
        m.handler();
        searchResults.classList.remove('open');
        searchInput.value = '';
      });
      searchResults.appendChild(d);
    }
  }
  searchResults.classList.add('open');
});
document.addEventListener('click', e => {
  if(!e.target.closest('.search-wrap')) searchResults.classList.remove('open');
});

/* =========================================================
   ZOOM BUTTONS
   ========================================================= */
document.getElementById('zin').addEventListener('click', () => {
  camera.position.multiplyScalar(0.85);
  camera.position.clampLength(300, 2800);
});
document.getElementById('zout').addEventListener('click', () => {
  camera.position.multiplyScalar(1.17);
  camera.position.clampLength(300, 2800);
});
document.getElementById('zreset').addEventListener('click', resetView);

/* =========================================================
   RESIZE
   ========================================================= */
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* =========================================================
   ANIMATION LOOP
   ========================================================= */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Heartbeat pulse
  const pulse = 1 + Math.sin(t * 2.5) * 0.08 + Math.sin(t * 5.0) * 0.04;
  heart.scale.setScalar(pulse);
  heartGlow.scale.setScalar(160 * pulse);
  heartGlowMat.opacity = 0.8 + Math.sin(t * 2.5) * 0.15;

  // Ferdinand canopy — gentle breathing pulse of the painted cloud-groups
  const breath = 1 + Math.sin(t * 0.4) * 0.02;
  canopyGroup.scale.setScalar(breath);

  // Jörmungandr — slow subtle slither animation
  if(serpentGroup) serpentGroup.rotation.y = Math.sin(t * 0.06) * 0.04;

  // Character portraits — billboard to camera
  for(const m of realmMeshes){
    if(m.userData && m.userData.isBillboard){
      m.lookAt(camera.position);
    }
  }

  // Star-twinkle on embedded trunk stars
  for(const s of starGroup.children){
    s.scale.setScalar(0.7 + Math.sin(t * 3 + s.userData.twinkle) * 0.4);
  }

  // Leaves drift slowly downward and rotate
  leaves.rotation.y += 0.0008;

  // Null realm pulsing core
  for(const m of realmMeshes){
    if(m.userData && m.userData.nullPulse){
      const p = Math.abs(Math.sin(t * 2.5)) ** 4;
      m.scale.setScalar(1 + p * 0.7);
      m.material.opacity = 0.5 + p * 0.5;
      m.material.transparent = true;
    }
  }

  // Orbital rings slow rotation
  for(const m of realmMeshes){
    if(m.userData && m.userData.spin){
      m.rotation.z += m.userData.spin;
    }
  }

  // Camera fly-to animation
  if(camFlyTarget){
    camFlyTarget.t = Math.min(1, camFlyTarget.t + 0.025);
    const p = camFlyTarget.t;
    const ease = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;
    camera.position.lerp(camFlyTarget.camPos, ease * 0.12 + 0.04);
    controls.target.lerp(camFlyTarget.target, ease * 0.12 + 0.04);
    if(camFlyTarget.t >= 1) camFlyTarget = null;
  }

  controls.update();
  syncLabels();
  renderer.render(scene, camera);
}
animate();
</script>
